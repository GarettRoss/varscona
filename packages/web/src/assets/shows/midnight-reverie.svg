<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#080812"/>
      <stop offset="100%" stop-color="#03030a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#glow)"/>
  <!-- Constellation dots -->
  <circle cx="150" cy="130" r="1.5" fill="#c9a84c" fill-opacity="0.5"/>
  <circle cx="220" cy="90" r="1" fill="#c9a84c" fill-opacity="0.4"/>
  <circle cx="310" cy="115" r="2" fill="#c9a84c" fill-opacity="0.5"/>
  <circle cx="390" cy="85" r="1.5" fill="#c9a84c" fill-opacity="0.35"/>
  <circle cx="460" cy="140" r="1" fill="#c9a84c" fill-opacity="0.4"/>
  <circle cx="180" cy="200" r="1" fill="#c9a84c" fill-opacity="0.3"/>
  <circle cx="420" cy="190" r="1.5" fill="#c9a84c" fill-opacity="0.3"/>
  <line x1="150" y1="130" x2="220" y2="90" stroke="#c9a84c" stroke-width="0.4" stroke-opacity="0.15"/>
  <line x1="220" y1="90" x2="310" y2="115" stroke="#c9a84c" stroke-width="0.4" stroke-opacity="0.15"/>
  <line x1="310" y1="115" x2="390" y2="85" stroke="#c9a84c" stroke-width="0.4" stroke-opacity="0.15"/>
  <!-- Company -->
  <text x="300" y="95" font-family="Georgia, serif" font-size="13" fill="#c9a84c" fill-opacity="0.55" text-anchor="middle" letter-spacing="5">HOUSE OF HUSH</text>
  <!-- Title -->
  <text x="300" y="440" font-family="Georgia, serif" font-size="58" font-weight="bold" fill="#ffffff" text-anchor="middle">MIDNIGHT</text>
  <text x="300" y="510" font-family="Georgia, serif" font-size="58" font-weight="bold" fill="#c9a84c" text-anchor="middle">REVERIE</text>
  <line x1="130" y1="535" x2="470" y2="535" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="300" y="575" font-family="Georgia, serif" font-size="14" fill="#ffffff" fill-opacity="0.35" text-anchor="middle" font-style="italic">An evening of song, story and shadow</text>
  <text x="300" y="628" font-family="Georgia, serif" font-size="13" fill="#c9a84c" fill-opacity="0.5" text-anchor="middle" letter-spacing="3">SEP 15 – OCT 3, 2026</text>
  <text x="300" y="768" font-family="Georgia, serif" font-size="11" fill="#c9a84c" fill-opacity="0.25" text-anchor="middle" letter-spacing="4">VARSCONA THEATRE</text>
</svg>
