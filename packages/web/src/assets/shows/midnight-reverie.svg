<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <rect width="600" height="800" fill="none" stroke="#ffffff" stroke-width="0.4" stroke-dasharray="1,60" stroke-opacity="0.05"/>

  <defs>
    <mask id="cm">
      <rect width="600" height="800" fill="white"/>
      <circle cx="335" cy="258" r="72" fill="black"/>
    </mask>
    <mask id="im">
      <circle cx="297" cy="268" r="80" fill="white"/>
    </mask>
  </defs>

  <!-- Crescent moon -->
  <circle cx="297" cy="268" r="80" fill="none" stroke="#ffffff" stroke-width="3" stroke-opacity="0.65" mask="url(#cm)"/>
  <circle cx="335" cy="258" r="72" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.28" mask="url(#im)"/>

  <!-- Firework burst — upper right -->
  <g transform="translate(422, 198)" stroke="#ffffff" stroke-linecap="round" stroke-opacity="0.5" stroke-width="1.5">
    <line x1="0" y1="-26" x2="0" y2="-15"/>
    <line x1="18.4" y1="-18.4" x2="10.6" y2="-10.6"/>
    <line x1="26" y1="0" x2="15" y2="0"/>
    <line x1="18.4" y1="18.4" x2="10.6" y2="10.6"/>
    <line x1="0" y1="26" x2="0" y2="15"/>
    <line x1="-18.4" y1="18.4" x2="-10.6" y2="10.6"/>
    <line x1="-26" y1="0" x2="-15" y2="0"/>
    <line x1="-18.4" y1="-18.4" x2="-10.6" y2="-10.6"/>
  </g>

  <!-- Firework burst — lower left -->
  <g transform="translate(162, 362)" stroke="#ffffff" stroke-linecap="round" stroke-opacity="0.38" stroke-width="1.5">
    <line x1="0" y1="-20" x2="0" y2="-12"/>
    <line x1="14.1" y1="-14.1" x2="8.5" y2="-8.5"/>
    <line x1="20" y1="0" x2="12" y2="0"/>
    <line x1="14.1" y1="14.1" x2="8.5" y2="8.5"/>
    <line x1="0" y1="20" x2="0" y2="12"/>
    <line x1="-14.1" y1="14.1" x2="-8.5" y2="8.5"/>
    <line x1="-20" y1="0" x2="-12" y2="0"/>
    <line x1="-14.1" y1="-14.1" x2="-8.5" y2="-8.5"/>
  </g>

  <!-- Firework burst — lower right (small) -->
  <g transform="translate(408, 382)" stroke="#ffffff" stroke-linecap="round" stroke-opacity="0.28" stroke-width="1">
    <line x1="0" y1="-15" x2="0" y2="-9"/>
    <line x1="10.6" y1="-10.6" x2="6.4" y2="-6.4"/>
    <line x1="15" y1="0" x2="9" y2="0"/>
    <line x1="10.6" y1="10.6" x2="6.4" y2="6.4"/>
    <line x1="0" y1="15" x2="0" y2="9"/>
    <line x1="-10.6" y1="10.6" x2="-6.4" y2="6.4"/>
    <line x1="-15" y1="0" x2="-9" y2="0"/>
    <line x1="-10.6" y1="-10.6" x2="-6.4" y2="-6.4"/>
  </g>

  <!-- Stars -->
  <circle cx="388" cy="318" r="2" fill="#ffffff" fill-opacity="0.38"/>
  <circle cx="192" cy="218" r="1.5" fill="#ffffff" fill-opacity="0.3"/>
  <circle cx="445" cy="255" r="1.5" fill="#ffffff" fill-opacity="0.28"/>
  <circle cx="148" cy="292" r="2" fill="#ffffff" fill-opacity="0.32"/>
  <circle cx="452" cy="330" r="1" fill="#ffffff" fill-opacity="0.25"/>
  <circle cx="168" cy="168" r="1.5" fill="#ffffff" fill-opacity="0.22"/>

  <text x="300" y="96" font-family="Georgia, serif" font-size="13" fill="#ffffff" fill-opacity="0.65" text-anchor="middle" letter-spacing="5">HOUSE OF HUSH</text>
  <line x1="120" y1="112" x2="480" y2="112" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.2"/>

  <text x="300" y="515" font-family="Georgia, serif" font-size="76" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="-1">MIDNIGHT</text>
  <text x="300" y="600" font-family="Georgia, serif" font-size="76" font-weight="bold" fill="#ffffff" fill-opacity="0.8" text-anchor="middle" letter-spacing="-1">REVERIE</text>

  <line x1="160" y1="628" x2="440" y2="628" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.25"/>
  <text x="300" y="666" font-family="Georgia, serif" font-size="16" fill="#ffffff" fill-opacity="0.6" text-anchor="middle" letter-spacing="3">SEPT 15 – OCT 3</text>
  <text x="300" y="762" font-family="Georgia, serif" font-size="11" fill="#ffffff" fill-opacity="0.25" text-anchor="middle" letter-spacing="4">VARSCONA THEATRE · EDMONTON</text>
</svg>
