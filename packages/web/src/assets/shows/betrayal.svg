<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0505"/>
      <stop offset="100%" stop-color="#100808"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <!-- Diagonal slash -->
  <line x1="0" y1="800" x2="600" y2="0" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.08"/>
  <line x1="50" y1="800" x2="650" y2="0" stroke="#c9a84c" stroke-width="0.3" stroke-opacity="0.05"/>
  <!-- Broken ring / circle -->
  <circle cx="300" cy="260" r="90" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.15" stroke-dasharray="200 80"/>
  <circle cx="300" cy="260" r="70" fill="none" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.12"/>
  <!-- Company -->
  <text x="300" y="95" font-family="Georgia, serif" font-size="13" fill="#c9a84c" fill-opacity="0.55" text-anchor="middle" letter-spacing="5">TRUNK THEATRE</text>
  <line x1="100" y1="112" x2="500" y2="112" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.2"/>
  <!-- Title -->
  <text x="300" y="470" font-family="Georgia, serif" font-size="80" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="-2">BETRAY</text>
  <text x="300" y="555" font-family="Georgia, serif" font-size="80" font-weight="bold" fill="#c9a84c" text-anchor="middle" letter-spacing="-2">AL</text>
  <line x1="150" y1="580" x2="450" y2="580" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="300" y="620" font-family="Georgia, serif" font-size="14" fill="#ffffff" fill-opacity="0.35" text-anchor="middle" font-style="italic">A play by Harold Pinter</text>
  <text x="300" y="672" font-family="Georgia, serif" font-size="13" fill="#c9a84c" fill-opacity="0.5" text-anchor="middle" letter-spacing="3">NOV 4 – NOV 22, 2026</text>
  <text x="300" y="768" font-family="Georgia, serif" font-size="11" fill="#c9a84c" fill-opacity="0.25" text-anchor="middle" letter-spacing="4">VARSCONA THEATRE</text>
</svg>
