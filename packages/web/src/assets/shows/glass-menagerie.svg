<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0a0f14"/>
      <stop offset="100%" stop-color="#050709"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#4a7fa5" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#4a7fa5" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#glow)"/>
  <!-- Glass fragments / shards -->
  <polygon points="200,120 280,180 240,240 160,200" fill="none" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.3"/>
  <polygon points="280,180 380,150 360,230 280,240" fill="none" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.25"/>
  <polygon points="160,200 240,240 200,310 120,270" fill="none" stroke="#c9a84c" stroke-width="0.6" stroke-opacity="0.2"/>
  <polygon points="360,130 440,170 420,240 350,220" fill="none" stroke="#c9a84c" stroke-width="0.7" stroke-opacity="0.2"/>
  <!-- Unicorn silhouette (tiny, symbolic) -->
  <ellipse cx="300" cy="290" rx="18" ry="10" fill="#c9a84c" fill-opacity="0.08"/>
  <!-- Company -->
  <text x="300" y="95" font-family="Georgia, serif" font-size="13" fill="#c9a84c" fill-opacity="0.55" text-anchor="middle" letter-spacing="5">TRUNK THEATRE</text>
  <line x1="100" y1="112" x2="500" y2="112" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.2"/>
  <!-- Title -->
  <text x="300" y="420" font-family="Georgia, serif" font-size="46" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="-1">THE GLASS</text>
  <text x="300" y="490" font-family="Georgia, serif" font-size="46" font-weight="bold" fill="#c9a84c" text-anchor="middle" letter-spacing="-1">MENAGERIE</text>
  <line x1="130" y1="516" x2="470" y2="516" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="300" y="556" font-family="Georgia, serif" font-size="14" fill="#ffffff" fill-opacity="0.35" text-anchor="middle" font-style="italic">A play by Tennessee Williams</text>
  <text x="300" y="610" font-family="Georgia, serif" font-size="13" fill="#c9a84c" fill-opacity="0.5" text-anchor="middle" letter-spacing="3">FEB 3 – FEB 21, 2027</text>
  <text x="300" y="768" font-family="Georgia, serif" font-size="11" fill="#c9a84c" fill-opacity="0.25" text-anchor="middle" letter-spacing="4">VARSCONA THEATRE</text>
</svg>
