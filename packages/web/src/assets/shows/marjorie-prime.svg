<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#5c1212"/>
      <stop offset="55%" stop-color="#2a0606"/>
      <stop offset="100%" stop-color="#0a0101"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="none" stroke="#ffffff" stroke-width="0.4" stroke-dasharray="1,60" stroke-opacity="0.05"/>

  <!-- Icon: stick figure with memory arcs -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke" transform="translate(300,290) scale(0.1) translate(-300,-290)">
    <!-- Head -->
    <circle cx="300" cy="192" r="26" stroke-width="3" stroke-opacity="0.6"/>
    <!-- Spine -->
    <line x1="300" y1="218" x2="300" y2="320" stroke-width="3" stroke-opacity="0.6"/>
    <!-- Arms -->
    <line x1="300" y1="255" x2="242" y2="298" stroke-width="3" stroke-opacity="0.6"/>
    <line x1="300" y1="255" x2="358" y2="298" stroke-width="3" stroke-opacity="0.6"/>
    <!-- Legs -->
    <line x1="300" y1="320" x2="262" y2="400" stroke-width="3" stroke-opacity="0.6"/>
    <line x1="300" y1="320" x2="338" y2="400" stroke-width="3" stroke-opacity="0.6"/>
    <!-- Memory arcs -->
    <path d="M 326,182 Q 368,162 362,210" stroke-width="2" stroke-opacity="0.35" stroke-dasharray="5,6"/>
    <path d="M 334,175 Q 394,148 385,208" stroke-width="1.5" stroke-opacity="0.2" stroke-dasharray="4,7"/>
    <path d="M 340,168 Q 418,136 406,206" stroke-width="1" stroke-opacity="0.12" stroke-dasharray="3,8"/>
  </g>

  <!-- Company -->
  <text x="300" y="96" font-family="Georgia, serif" font-size="13" fill="#ffffff" fill-opacity="0.65" text-anchor="middle" letter-spacing="5">TRUNK THEATRE</text>
  <line x1="120" y1="112" x2="480" y2="112" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Title -->
  <text x="300" y="510" font-family="Georgia, serif" font-size="76" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="-1">MARJORIE</text>
  <text x="300" y="595" font-family="Georgia, serif" font-size="76" font-weight="bold" fill="#ffffff" fill-opacity="0.75" text-anchor="middle" letter-spacing="-1">PRIME</text>

  <!-- Date -->
  <line x1="160" y1="625" x2="440" y2="625" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.25"/>
  <text x="300" y="665" font-family="Georgia, serif" font-size="16" fill="#ffffff" fill-opacity="0.6" text-anchor="middle" letter-spacing="3">APRIL 15 – MAY 10</text>

  <text x="300" y="762" font-family="Georgia, serif" font-size="11" fill="#ffffff" fill-opacity="0.25" text-anchor="middle" letter-spacing="4">VARSCONA THEATRE · EDMONTON</text>
</svg>
