<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4361EE"/>
      <stop offset="100%" stop-color="#2a45cc"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="none" stroke="#ffffff" stroke-width="0.4" stroke-dasharray="1,60" stroke-opacity="0.07"/>

  <!-- Icon: seated figure with memory waves -->
  <g transform="translate(300, 300)">
    <!-- Head -->
    <circle cx="0" cy="-90" r="38" fill="none" stroke="#ffffff" stroke-width="3" stroke-opacity="0.6"/>
    <!-- Body -->
    <rect x="-28" y="-48" width="56" height="72" rx="12" fill="none" stroke="#ffffff" stroke-width="3" stroke-opacity="0.6"/>
    <!-- Arms -->
    <line x1="-28" y1="-28" x2="-65" y2="10" stroke="#ffffff" stroke-width="3" stroke-opacity="0.6" stroke-linecap="round"/>
    <line x1="28" y1="-28" x2="65" y2="10" stroke="#ffffff" stroke-width="3" stroke-opacity="0.6" stroke-linecap="round"/>
    <!-- Memory arcs emanating from head -->
    <path d="M 50,-95 Q 90,-60 70,-20" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.3" stroke-dasharray="5,5"/>
    <path d="M 65,-100 Q 115,-55 90,-10" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.2" stroke-dasharray="4,6"/>
    <path d="M 75,-108 Q 135,-50 105,0" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.12" stroke-dasharray="3,7"/>
  </g>

  <!-- Company -->
  <text x="300" y="96" font-family="Georgia, serif" font-size="13" fill="#ffffff" fill-opacity="0.65" text-anchor="middle" letter-spacing="5">TRUNK THEATRE</text>
  <line x1="120" y1="112" x2="480" y2="112" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Title -->
  <text x="300" y="510" font-family="Georgia, serif" font-size="76" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="-1">MARJORIE</text>
  <text x="300" y="595" font-family="Georgia, serif" font-size="76" font-weight="bold" fill="#ffffff" fill-opacity="0.75" text-anchor="middle" letter-spacing="-1">PRIME</text>

  <!-- Date -->
  <line x1="160" y1="625" x2="440" y2="625" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.25"/>
  <text x="300" y="665" font-family="Georgia, serif" font-size="16" fill="#ffffff" fill-opacity="0.6" text-anchor="middle" letter-spacing="3">APRIL 15 – MAY 10</text>

  <text x="300" y="762" font-family="Georgia, serif" font-size="11" fill="#ffffff" fill-opacity="0.25" text-anchor="middle" letter-spacing="4">VARSCONA THEATRE · EDMONTON</text>
</svg>
