<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- Subtle vertical lines texture -->
  <rect x="0" y="0" width="1600" height="900" fill="none" stroke="#c9a84c" stroke-width="0.3" stroke-dasharray="1,80" stroke-opacity="0.08"/>

  <!-- Center circle glow -->
  <circle cx="800" cy="420" r="320" fill="none" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.12"/>
  <circle cx="800" cy="420" r="280" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.08"/>

  <!-- Abstract human silhouette (seated figure) -->
  <g transform="translate(800, 420)" fill="#c9a84c" fill-opacity="0.1">
    <ellipse cx="0" cy="-60" rx="28" ry="35"/>
    <rect x="-22" y="-30" width="44" height="70" rx="8"/>
    <rect x="-40" y="5" width="20" height="55" rx="6"/>
    <rect x="20" y="5" width="20" height="55" rx="6"/>
  </g>

  <!-- Top ornament -->
  <line x1="650" y1="160" x2="750" y2="160" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="800" cy="160" r="4" fill="#c9a84c" fill-opacity="0.5"/>
  <line x1="850" y1="160" x2="950" y2="160" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Company label -->
  <text x="800" y="220" font-family="Georgia, serif" font-size="18" fill="#c9a84c" fill-opacity="0.7" text-anchor="middle" letter-spacing="6">TRUNK THEATRE</text>

  <!-- Presents -->
  <text x="800" y="255" font-family="Georgia, serif" font-size="13" fill="#c9a84c" fill-opacity="0.4" text-anchor="middle" letter-spacing="3">PRESENTS</text>

  <!-- Main title -->
  <text x="800" y="370" font-family="Georgia, serif" font-size="92" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="-1">MARJORIE</text>
  <text x="800" y="460" font-family="Georgia, serif" font-size="92" font-weight="bold" fill="#c9a84c" text-anchor="middle" letter-spacing="-1">PRIME</text>

  <!-- Divider -->
  <line x1="680" y1="495" x2="920" y2="495" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Tagline -->
  <text x="800" y="540" font-family="Georgia, serif" font-size="20" fill="#ffffff" fill-opacity="0.5" text-anchor="middle" letter-spacing="1" font-style="italic">What remains when memory fades?</text>

  <!-- Date -->
  <text x="800" y="610" font-family="Georgia, serif" font-size="16" fill="#c9a84c" fill-opacity="0.6" text-anchor="middle" letter-spacing="4">APRIL 9 – APRIL 19</text>

  <!-- Bottom border -->
  <line x1="100" y1="840" x2="1500" y2="840" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.2"/>
  <text x="800" y="868" font-family="Georgia, serif" font-size="13" fill="#c9a84c" fill-opacity="0.3" text-anchor="middle" letter-spacing="5">VARSCONA THEATRE · EDMONTON</text>
</svg>
