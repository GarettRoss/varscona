<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b088e8"/>
      <stop offset="100%" stop-color="#9060cc"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="none" stroke="#ffffff" stroke-width="0.4" stroke-dasharray="1,60" stroke-opacity="0.07"/>

  <!-- Icon: cocktail glass -->
  <g transform="translate(300, 310)" fill="none" stroke="#ffffff" stroke-opacity="0.6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Glass bowl -->
    <polygon points="-75,-95 75,-95 32,30 -32,30"/>
    <!-- Stem -->
    <line x1="0" y1="30" x2="0" y2="100"/>
    <!-- Base -->
    <line x1="-45" y1="100" x2="45" y2="100"/>
    <!-- Liquid surface -->
    <line x1="-68" y1="-60" x2="68" y2="-60" stroke-opacity="0.35"/>
    <!-- Olive on stick -->
    <line x1="55" y1="-105" x2="20" y2="-75" stroke-opacity="0.5"/>
    <circle cx="60" cy="-110" r="10" stroke-opacity="0.5"/>
  </g>

  <!-- Company -->
  <text x="300" y="96" font-family="Georgia, serif" font-size="13" fill="#ffffff" fill-opacity="0.75" text-anchor="middle" letter-spacing="5">TEATRO LIVE!</text>
  <line x1="120" y1="112" x2="480" y2="112" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Title -->
  <text x="300" y="510" font-family="Georgia, serif" font-size="66" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="-1">COCKTAILS</text>
  <text x="300" y="572" font-family="Georgia, serif" font-size="36" fill="#ffffff" fill-opacity="0.7" text-anchor="middle" letter-spacing="4">AT</text>
  <text x="300" y="640" font-family="Georgia, serif" font-size="66" font-weight="bold" fill="#ffffff" fill-opacity="0.85" text-anchor="middle" letter-spacing="-1">PAM'S</text>

  <!-- Date -->
  <line x1="160" y1="660" x2="440" y2="660" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.25"/>
  <text x="300" y="696" font-family="Georgia, serif" font-size="16" fill="#ffffff" fill-opacity="0.65" text-anchor="middle" letter-spacing="3">AUG 11 – 30</text>

  <text x="300" y="762" font-family="Georgia, serif" font-size="11" fill="#ffffff" fill-opacity="0.25" text-anchor="middle" letter-spacing="4">VARSCONA THEATRE · EDMONTON</text>
</svg>
