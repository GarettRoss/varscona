<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0508"/>
      <stop offset="100%" stop-color="#0a0310"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#glow)"/>

  <!-- Cocktail glass silhouette -->
  <g transform="translate(300, 230)" fill="#c9a84c" fill-opacity="0.1">
    <!-- Glass bowl -->
    <polygon points="-70,-90 70,-90 30,30 -30,30"/>
    <!-- Stem -->
    <rect x="-5" y="30" width="10" height="60"/>
    <!-- Base -->
    <rect x="-35" y="90" width="70" height="8" rx="4"/>
    <!-- Liquid -->
    <polygon points="-62,-75 62,-75 28,20 -28,20" fill="#8b1a4a" fill-opacity="0.5"/>
    <!-- Olive/garnish -->
    <circle cx="50" cy="-95" r="8" fill="#2a5a1a" fill-opacity="0.7"/>
    <line x1="50" y1="-103" x2="50" y2="-130" stroke="#c9a84c" stroke-width="1.5" stroke-opacity="0.5"/>
  </g>

  <!-- Decorative dots -->
  <circle cx="100" cy="150" r="2" fill="#c9a84c" fill-opacity="0.3"/>
  <circle cx="500" cy="120" r="2" fill="#c9a84c" fill-opacity="0.3"/>
  <circle cx="80" cy="400" r="1.5" fill="#c9a84c" fill-opacity="0.2"/>
  <circle cx="520" cy="380" r="1.5" fill="#c9a84c" fill-opacity="0.2"/>
  <circle cx="150" cy="600" r="2" fill="#c9a84c" fill-opacity="0.15"/>
  <circle cx="450" cy="580" r="2" fill="#c9a84c" fill-opacity="0.15"/>

  <!-- Company -->
  <text x="300" y="95" font-family="Georgia, serif" font-size="13" fill="#c9a84c" fill-opacity="0.55" text-anchor="middle" letter-spacing="5">TEATRO LIVE!</text>

  <line x1="100" y1="112" x2="500" y2="112" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Title -->
  <text x="300" y="450" font-family="Georgia, serif" font-size="58" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="-1">COCKTAILS</text>
  <text x="300" y="510" font-family="Georgia, serif" font-size="30" fill="#c9a84c" fill-opacity="0.7" text-anchor="middle" letter-spacing="4">AT</text>
  <text x="300" y="580" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="#c9a84c" text-anchor="middle" letter-spacing="-1">PAM'S</text>

  <!-- Divider -->
  <line x1="130" y1="608" x2="470" y2="608" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.3"/>

  <!-- Tagline -->
  <text x="300" y="648" font-family="Georgia, serif" font-size="14" fill="#ffffff" fill-opacity="0.35" text-anchor="middle" font-style="italic">The party of the season</text>

  <!-- Date -->
  <text x="300" y="700" font-family="Georgia, serif" font-size="13" fill="#c9a84c" fill-opacity="0.5" text-anchor="middle" letter-spacing="3">SUMMER 2025</text>

  <text x="300" y="768" font-family="Georgia, serif" font-size="11" fill="#c9a84c" fill-opacity="0.25" text-anchor="middle" letter-spacing="4">VARSCONA THEATRE</text>
</svg>
