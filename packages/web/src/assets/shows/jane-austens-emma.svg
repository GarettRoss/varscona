<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <rect width="600" height="800" fill="none" stroke="#ffffff" stroke-width="0.4" stroke-dasharray="1,60" stroke-opacity="0.07"/>

  <!-- Open fan -->
  <g transform="translate(300, 330)">
    <!-- Fan ribs radiating from handle base -->
    <line x1="0" y1="40" x2="-130" y2="-120" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="40" x2="-95" y2="-148" stroke="#ffffff" stroke-opacity="0.4" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="40" x2="-50" y2="-162" stroke="#ffffff" stroke-opacity="0.45" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="40" x2="0" y2="-165" stroke="#ffffff" stroke-opacity="0.5" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="40" x2="50" y2="-162" stroke="#ffffff" stroke-opacity="0.45" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="40" x2="95" y2="-148" stroke="#ffffff" stroke-opacity="0.4" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="40" x2="130" y2="-120" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Fan arc (outer edge) -->
    <path d="M-130,-120 Q-115,-155 -95,-148 Q-72,-162 -50,-162 Q-25,-168 0,-165 Q25,-168 50,-162 Q72,-162 95,-148 Q115,-155 130,-120"
          fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="2" stroke-linecap="round"/>

    <!-- Fan inner arc detail -->
    <path d="M-88,-82 Q-65,-108 -34,-112 Q0,-120 34,-112 Q65,-108 88,-82"
          fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.2"/>

    <!-- Small floral detail on fan face -->
    <circle cx="0" cy="-130" r="5" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1.2"/>
    <circle cx="-50" cy="-125" r="4" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.2"/>
    <circle cx="50" cy="-125" r="4" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.2"/>

    <!-- Fan handle -->
    <path d="M-6,40 L-10,90 Q-8,100 0,102 Q8,100 10,90 L6,40"
          fill="none" stroke="#ffffff" stroke-opacity="0.5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Decorative ribbon at handle -->
    <path d="M-10,70 Q-22,60 -18,50 Q-10,55 0,52 Q10,55 18,50 Q22,60 10,70"
          fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1.5"/>
  </g>

  <!-- Company -->
  <text x="300" y="96" font-family="Georgia, serif" font-size="13" fill="#ffffff" fill-opacity="0.65" text-anchor="middle" letter-spacing="5">TEATRO LIVE!</text>
  <line x1="120" y1="112" x2="480" y2="112" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Title -->
  <text x="300" y="510" font-family="Georgia, serif" font-size="22" fill="#ffffff" fill-opacity="0.55" text-anchor="middle" letter-spacing="6">JANE AUSTEN'S</text>
  <text x="300" y="592" font-family="Georgia, serif" font-size="110" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="-2">EMMA</text>

  <!-- Date -->
  <line x1="160" y1="618" x2="440" y2="618" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.25"/>
  <text x="300" y="656" font-family="Georgia, serif" font-size="16" fill="#ffffff" fill-opacity="0.6" text-anchor="middle" letter-spacing="3">JULY 9 – 25, 2027</text>

  <text x="300" y="762" font-family="Georgia, serif" font-size="11" fill="#ffffff" fill-opacity="0.25" text-anchor="middle" letter-spacing="4">VARSCONA THEATRE · EDMONTON</text>
</svg>
