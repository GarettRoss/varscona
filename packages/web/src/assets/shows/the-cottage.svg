<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <rect width="600" height="800" fill="none" stroke="#ffffff" stroke-width="0.4" stroke-dasharray="1,60" stroke-opacity="0.07"/>

  <!-- Cottage -->
  <g transform="translate(300, 310)" fill="none" stroke="#ffffff" stroke-opacity="0.6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Roof -->
    <path d="M-110,0 L0,-90 L110,0"/>
    <!-- Chimney -->
    <rect x="50" y="-105" width="22" height="40" stroke-width="2"/>
    <!-- Smoke wisps -->
    <path d="M56,-108 C52,-122 60,-132 56,-145" stroke-opacity="0.25" stroke-width="1.5"/>
    <path d="M67,-108 C71,-120 63,-130 67,-143" stroke-opacity="0.2" stroke-width="1.5"/>
    <!-- Walls -->
    <rect x="-90" y="0" width="180" height="110" stroke-width="2.5"/>
    <!-- Door -->
    <path d="M-18,110 L-18,52 Q-18,38 0,38 Q18,38 18,52 L18,110" stroke-width="2"/>
    <!-- Door knob -->
    <circle cx="14" cy="76" r="3" stroke-width="1.5" stroke-opacity="0.4"/>
    <!-- Left window -->
    <rect x="-72" y="20" width="36" height="36" stroke-width="1.8" stroke-opacity="0.5"/>
    <line x1="-54" y1="20" x2="-54" y2="56" stroke-opacity="0.3" stroke-width="1"/>
    <line x1="-72" y1="38" x2="-36" y2="38" stroke-opacity="0.3" stroke-width="1"/>
    <!-- Right window -->
    <rect x="36" y="20" width="36" height="36" stroke-width="1.8" stroke-opacity="0.5"/>
    <line x1="54" y1="20" x2="54" y2="56" stroke-opacity="0.3" stroke-width="1"/>
    <line x1="36" y1="38" x2="72" y2="38" stroke-opacity="0.3" stroke-width="1"/>
    <!-- Ground line -->
    <line x1="-120" y1="110" x2="120" y2="110" stroke-opacity="0.2" stroke-width="1"/>
    <!-- Garden path -->
    <path d="M-22,110 L-30,160 M22,110 L30,160" stroke-opacity="0.15" stroke-width="1.5"/>
  </g>

  <!-- Heart above door -->
  <g transform="translate(300, 195)">
    <path d="M0,12 C0,12 -18,-6 -18,-16 C-18,-26 -9,-30 0,-22 C9,-30 18,-26 18,-16 C18,-6 0,12 0,12 Z"
          fill="none" stroke="#ffffff" stroke-opacity="0.5" stroke-width="2"/>
  </g>

  <!-- Company -->
  <text x="300" y="96" font-family="Georgia, serif" font-size="13" fill="#ffffff" fill-opacity="0.65" text-anchor="middle" letter-spacing="5">TEATRO LIVE!</text>
  <line x1="120" y1="112" x2="480" y2="112" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Title -->
  <text x="300" y="530" font-family="Georgia, serif" font-size="60" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2">THE</text>
  <text x="300" y="610" font-family="Georgia, serif" font-size="78" font-weight="bold" fill="#ffffff" fill-opacity="0.85" text-anchor="middle" letter-spacing="-1">COTTAGE</text>

  <!-- Date -->
  <line x1="160" y1="636" x2="440" y2="636" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.25"/>
  <text x="300" y="674" font-family="Georgia, serif" font-size="16" fill="#ffffff" fill-opacity="0.6" text-anchor="middle" letter-spacing="3">NOV 12 – 29</text>

  <text x="300" y="762" font-family="Georgia, serif" font-size="11" fill="#ffffff" fill-opacity="0.25" text-anchor="middle" letter-spacing="4">VARSCONA THEATRE · EDMONTON</text>
</svg>
