<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a0806"/>
      <stop offset="100%" stop-color="#060504"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <!-- Stage curtain silhouette -->
  <path d="M 0 0 Q 80 300 0 600" fill="#8b1a1a" fill-opacity="0.12"/>
  <path d="M 600 0 Q 520 300 600 600" fill="#8b1a1a" fill-opacity="0.12"/>
  <!-- Sound wave rings -->
  <circle cx="300" cy="230" r="40" fill="none" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.2"/>
  <circle cx="300" cy="230" r="70" fill="none" stroke="#c9a84c" stroke-width="0.6" stroke-opacity="0.15"/>
  <circle cx="300" cy="230" r="100" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.1"/>
  <circle cx="300" cy="230" r="130" fill="none" stroke="#c9a84c" stroke-width="0.4" stroke-opacity="0.07"/>
  <!-- Company -->
  <text x="300" y="95" font-family="Georgia, serif" font-size="13" fill="#c9a84c" fill-opacity="0.55" text-anchor="middle" letter-spacing="5">TEATRO LIVE!</text>
  <!-- Title -->
  <text x="300" y="460" font-family="Georgia, serif" font-size="68" font-weight="bold" fill="#ffffff" text-anchor="middle">NOISES</text>
  <text x="300" y="535" font-family="Georgia, serif" font-size="68" font-weight="bold" fill="#c9a84c" text-anchor="middle">OFF</text>
  <line x1="140" y1="560" x2="460" y2="560" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="300" y="600" font-family="Georgia, serif" font-size="14" fill="#ffffff" fill-opacity="0.35" text-anchor="middle" font-style="italic">The funniest farce ever written</text>
  <text x="300" y="653" font-family="Georgia, serif" font-size="13" fill="#c9a84c" fill-opacity="0.5" text-anchor="middle" letter-spacing="3">MAR 9 – MAR 27, 2027</text>
  <text x="300" y="768" font-family="Georgia, serif" font-size="11" fill="#c9a84c" fill-opacity="0.25" text-anchor="middle" letter-spacing="4">VARSCONA THEATRE</text>
</svg>
