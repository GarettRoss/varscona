<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#5c1212"/>
      <stop offset="55%" stop-color="#2a0606"/>
      <stop offset="100%" stop-color="#0a0101"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="none" stroke="#ffffff" stroke-width="0.4" stroke-dasharray="1,60" stroke-opacity="0.05"/>

  <!-- Icon: knife -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
    <!-- Blade -->
    <path d="M300,165 L286,355 L314,355 Z" stroke-width="3" stroke-opacity="0.6"/>
    <!-- Bolster -->
    <line x1="278" y1="362" x2="322" y2="362" stroke-width="3" stroke-opacity="0.6"/>
    <!-- Handle -->
    <rect x="288" y="368" width="24" height="72" rx="4" stroke-width="3" stroke-opacity="0.6"/>
    <!-- Handle rivets -->
    <circle cx="300" cy="388" r="3" stroke-width="2" stroke-opacity="0.4"/>
    <circle cx="300" cy="412" r="3" stroke-width="2" stroke-opacity="0.4"/>
    <circle cx="300" cy="432" r="3" stroke-width="2" stroke-opacity="0.4"/>
  </g>

  <!-- Company -->
  <text x="300" y="96" font-family="Georgia, serif" font-size="13" fill="#ffffff" fill-opacity="0.65" text-anchor="middle" letter-spacing="5">DIE-NASTY</text>
  <line x1="120" y1="112" x2="480" y2="112" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Title -->
  <text x="300" y="530" font-family="Georgia, serif" font-size="100" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="-2">DIE</text>
  <text x="300" y="625" font-family="Georgia, serif" font-size="100" font-weight="bold" fill="#ffffff" fill-opacity="0.8" text-anchor="middle" letter-spacing="-2">NASTY</text>

  <!-- Date -->
  <line x1="160" y1="650" x2="440" y2="650" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.25"/>
  <text x="300" y="688" font-family="Georgia, serif" font-size="16" fill="#ffffff" fill-opacity="0.6" text-anchor="middle" letter-spacing="3">EVERY MONDAY · 7:30 PM</text>

  <text x="300" y="762" font-family="Georgia, serif" font-size="11" fill="#ffffff" fill-opacity="0.25" text-anchor="middle" letter-spacing="4">VARSCONA THEATRE · EDMONTON</text>
</svg>
