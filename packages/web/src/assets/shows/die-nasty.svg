<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1f0a0a"/>
      <stop offset="100%" stop-color="#080404"/>
    </radialGradient>
    <radialGradient id="spot" cx="50%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#spot)"/>

  <!-- Stage spotlight beams -->
  <polygon points="800,80 520,900 680,900" fill="#c9a84c" fill-opacity="0.04"/>
  <polygon points="800,80 720,900 880,900" fill="#c9a84c" fill-opacity="0.06"/>
  <polygon points="800,80 920,900 1080,900" fill="#c9a84c" fill-opacity="0.04"/>

  <!-- Dramatic lightning bolt accent -->
  <polygon points="750,180 770,320 720,320 780,500 760,500 820,340 860,340 800,180" fill="#c9a84c" fill-opacity="0.15"/>

  <!-- Top label -->
  <text x="800" y="210" font-family="Georgia, serif" font-size="16" fill="#c9a84c" fill-opacity="0.6" text-anchor="middle" letter-spacing="8">AN EDMONTON INSTITUTION</text>

  <!-- Horizontal rules -->
  <line x1="200" y1="230" x2="580" y2="230" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.3"/>
  <line x1="1020" y1="230" x2="1400" y2="230" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.3"/>

  <!-- Main title - DIE -->
  <text x="800" y="430" font-family="Georgia, serif" font-size="170" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="20">DIE</text>

  <!-- Dash -->
  <text x="800" y="520" font-family="Georgia, serif" font-size="50" fill="#c9a84c" text-anchor="middle">—</text>

  <!-- NASTY -->
  <text x="800" y="660" font-family="Georgia, serif" font-size="170" font-weight="bold" fill="#c9a84c" text-anchor="middle" letter-spacing="10">NASTY</text>

  <!-- Tagline -->
  <text x="800" y="730" font-family="Georgia, serif" font-size="18" fill="#ffffff" fill-opacity="0.4" text-anchor="middle" letter-spacing="3" font-style="italic">Live improvised soap opera · No two nights alike</text>

  <!-- Schedule -->
  <rect x="640" y="760" width="320" height="44" rx="2" fill="#c9a84c" fill-opacity="0.08" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="800" y="788" font-family="Georgia, serif" font-size="15" fill="#c9a84c" text-anchor="middle" letter-spacing="4">EVERY MONDAY · 7:30 PM</text>

  <text x="800" y="858" font-family="Georgia, serif" font-size="13" fill="#c9a84c" fill-opacity="0.3" text-anchor="middle" letter-spacing="5">VARSCONA THEATRE · EDMONTON</text>
</svg>
