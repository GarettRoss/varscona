<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#5c1212"/>
      <stop offset="55%" stop-color="#2a0606"/>
      <stop offset="100%" stop-color="#0a0101"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="none" stroke="#ffffff" stroke-width="0.4" stroke-dasharray="1,60" stroke-opacity="0.05"/>

  <!-- Icon: comedy (right) and tragedy (left) masks -->
  <g transform="translate(300, 310)" fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">

    <!-- Tragedy mask (left, slightly lower) -->
    <g transform="translate(-72, 20)" stroke-opacity="0.4" stroke-width="3">
      <!-- Face -->
      <ellipse cx="0" cy="0" rx="62" ry="75"/>
      <!-- Eyes — downturned -->
      <path d="M-28,-18 Q-22,-28 -14,-18"/>
      <path d="M14,-18 Q22,-28 28,-18"/>
      <!-- Mouth — frown -->
      <path d="M-28,30 Q0,14 28,30"/>
      <!-- Hanging ribbon -->
      <line x1="0" y1="75" x2="0" y2="112" stroke-width="2" stroke-opacity="0.25"/>
    </g>

    <!-- Comedy mask (right, slightly higher) -->
    <g transform="translate(72, -20)" stroke-opacity="0.65" stroke-width="3">
      <!-- Face -->
      <ellipse cx="0" cy="0" rx="62" ry="75"/>
      <!-- Eyes — upturned -->
      <path d="M-28,-22 Q-22,-34 -14,-22"/>
      <path d="M14,-22 Q22,-34 28,-22"/>
      <!-- Mouth — smile -->
      <path d="M-28,24 Q0,44 28,24"/>
      <!-- Hanging ribbon -->
      <line x1="0" y1="75" x2="0" y2="108" stroke-width="2" stroke-opacity="0.35"/>
    </g>

  </g>

  <!-- Company -->
  <text x="300" y="96" font-family="Georgia, serif" font-size="13" fill="#ffffff" fill-opacity="0.65" text-anchor="middle" letter-spacing="5">DIE-NASTY</text>
  <line x1="120" y1="112" x2="480" y2="112" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Title -->
  <text x="300" y="520" font-family="Georgia, serif" font-size="100" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="-2">DIE</text>
  <text x="300" y="610" font-family="Georgia, serif" font-size="100" font-weight="bold" fill="#ffffff" fill-opacity="0.8" text-anchor="middle" letter-spacing="-2">NASTY</text>

  <!-- Date -->
  <line x1="160" y1="638" x2="440" y2="638" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.25"/>
  <text x="300" y="676" font-family="Georgia, serif" font-size="16" fill="#ffffff" fill-opacity="0.6" text-anchor="middle" letter-spacing="3">EVERY MONDAY · 7:30 PM</text>

  <text x="300" y="762" font-family="Georgia, serif" font-size="11" fill="#ffffff" fill-opacity="0.25" text-anchor="middle" letter-spacing="4">VARSCONA THEATRE · EDMONTON</text>
</svg>
