<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF5F38"/>
      <stop offset="100%" stop-color="#cc3d18"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="none" stroke="#ffffff" stroke-width="0.4" stroke-dasharray="1,60" stroke-opacity="0.07"/>

  <!-- Icon: house silhouette -->
  <g transform="translate(300, 310)">
    <!-- Roof -->
    <polygon points="-110,-80 0,-180 110,-80" fill="none" stroke="#ffffff" stroke-width="3" stroke-opacity="0.6" stroke-linejoin="round"/>
    <!-- Walls -->
    <rect x="-85" y="-80" width="170" height="130" fill="none" stroke="#ffffff" stroke-width="3" stroke-opacity="0.6"/>
    <!-- Door -->
    <rect x="-22" y="10" width="44" height="40" rx="22" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.5"/>
    <!-- Windows -->
    <rect x="-68" y="-50" width="35" height="30" rx="4" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.4"/>
    <rect x="33" y="-50" width="35" height="30" rx="4" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.4"/>
    <!-- Chimney -->
    <rect x="50" y="-175" width="20" height="50" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.35"/>
  </g>

  <!-- Company -->
  <text x="300" y="96" font-family="Georgia, serif" font-size="13" fill="#ffffff" fill-opacity="0.65" text-anchor="middle" letter-spacing="5">HOUSE OF HUSH</text>
  <line x1="120" y1="112" x2="480" y2="112" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Title -->
  <text x="300" y="520" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="-1">HOUSE</text>
  <text x="300" y="600" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="#ffffff" fill-opacity="0.8" text-anchor="middle" letter-spacing="-1">OF HUSH</text>

  <!-- Date -->
  <line x1="160" y1="628" x2="440" y2="628" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.25"/>
  <text x="300" y="666" font-family="Georgia, serif" font-size="16" fill="#ffffff" fill-opacity="0.6" text-anchor="middle" letter-spacing="3">MAY 20 – JUNE 7</text>

  <text x="300" y="762" font-family="Georgia, serif" font-size="11" fill="#ffffff" fill-opacity="0.25" text-anchor="middle" letter-spacing="4">VARSCONA THEATRE · EDMONTON</text>
</svg>
