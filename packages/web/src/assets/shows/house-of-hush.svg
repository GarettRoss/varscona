<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="60%" r="70%">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#050508"/>
    </radialGradient>
    <radialGradient id="moon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#c9a84c" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="600" height="800" fill="url(#bg)"/>

  <!-- Moon glow -->
  <circle cx="300" cy="220" r="180" fill="url(#moon)"/>
  <circle cx="300" cy="220" r="70" fill="none" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.2"/>
  <circle cx="300" cy="220" r="50" fill="#c9a84c" fill-opacity="0.06"/>

  <!-- Stars -->
  <circle cx="120" cy="100" r="1.5" fill="#c9a84c" fill-opacity="0.5"/>
  <circle cx="200" cy="60" r="1" fill="#c9a84c" fill-opacity="0.4"/>
  <circle cx="380" cy="80" r="1.5" fill="#c9a84c" fill-opacity="0.6"/>
  <circle cx="480" cy="130" r="1" fill="#c9a84c" fill-opacity="0.3"/>
  <circle cx="150" cy="170" r="1" fill="#c9a84c" fill-opacity="0.4"/>
  <circle cx="450" cy="160" r="1.5" fill="#c9a84c" fill-opacity="0.5"/>
  <circle cx="60" cy="250" r="1" fill="#c9a84c" fill-opacity="0.3"/>
  <circle cx="530" cy="200" r="1" fill="#c9a84c" fill-opacity="0.4"/>

  <!-- Company -->
  <text x="300" y="90" font-family="Georgia, serif" font-size="13" fill="#c9a84c" fill-opacity="0.5" text-anchor="middle" letter-spacing="5">HOUSE OF HUSH</text>

  <!-- Title -->
  <text x="300" y="430" font-family="Georgia, serif" font-size="68" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="-1">HOUSE</text>
  <text x="300" y="500" font-family="Georgia, serif" font-size="28" fill="#c9a84c" fill-opacity="0.6" text-anchor="middle" letter-spacing="6">OF</text>
  <text x="300" y="575" font-family="Georgia, serif" font-size="68" font-weight="bold" fill="#c9a84c" text-anchor="middle" letter-spacing="-1">HUSH</text>

  <!-- Divider -->
  <line x1="200" y1="600" x2="400" y2="600" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.3"/>

  <!-- Tagline -->
  <text x="300" y="638" font-family="Georgia, serif" font-size="14" fill="#ffffff" fill-opacity="0.35" text-anchor="middle" font-style="italic">Some silences speak loudest</text>

  <!-- Date -->
  <text x="300" y="690" font-family="Georgia, serif" font-size="13" fill="#c9a84c" fill-opacity="0.5" text-anchor="middle" letter-spacing="3">COMING SOON</text>

  <text x="300" y="768" font-family="Georgia, serif" font-size="11" fill="#c9a84c" fill-opacity="0.25" text-anchor="middle" letter-spacing="4">VARSCONA THEATRE</text>
</svg>
