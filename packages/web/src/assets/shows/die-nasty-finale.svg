<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0505"/>
      <stop offset="100%" stop-color="#080202"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <!-- Confetti dots -->
  <circle cx="120" cy="150" r="3" fill="#c9a84c" fill-opacity="0.4"/>
  <circle cx="200" cy="100" r="2" fill="#ffffff" fill-opacity="0.3"/>
  <circle cx="400" cy="130" r="3" fill="#c9a84c" fill-opacity="0.35"/>
  <circle cx="480" cy="170" r="2" fill="#ffffff" fill-opacity="0.25"/>
  <circle cx="80" cy="250" r="2.5" fill="#c9a84c" fill-opacity="0.3"/>
  <circle cx="520" cy="220" r="2" fill="#ffffff" fill-opacity="0.2"/>
  <circle cx="160" cy="310" r="2" fill="#c9a84c" fill-opacity="0.25"/>
  <circle cx="440" cy="290" r="3" fill="#ffffff" fill-opacity="0.2"/>
  <!-- Crown -->
  <polygon points="220,200 240,160 270,190 300,150 330,190 360,160 380,200" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-opacity="0.25"/>
  <!-- Company -->
  <text x="300" y="95" font-family="Georgia, serif" font-size="13" fill="#c9a84c" fill-opacity="0.55" text-anchor="middle" letter-spacing="5">DIE-NASTY</text>
  <!-- Title -->
  <text x="300" y="380" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="#ffffff" text-anchor="middle">DIE-NASTY</text>
  <text x="300" y="440" font-family="Georgia, serif" font-size="26" fill="#c9a84c" text-anchor="middle" letter-spacing="3">SEASON FINALE</text>
  <text x="300" y="490" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#c9a84c" text-anchor="middle">SPECTACULAR</text>
  <line x1="100" y1="515" x2="500" y2="515" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="300" y="555" font-family="Georgia, serif" font-size="14" fill="#ffffff" fill-opacity="0.35" text-anchor="middle" font-style="italic">One night only — the season's wildest evening</text>
  <text x="300" y="610" font-family="Georgia, serif" font-size="13" fill="#c9a84c" fill-opacity="0.5" text-anchor="middle" letter-spacing="3">JUNE 8, 2026</text>
  <text x="300" y="768" font-family="Georgia, serif" font-size="11" fill="#c9a84c" fill-opacity="0.25" text-anchor="middle" letter-spacing="4">VARSCONA THEATRE</text>
</svg>
