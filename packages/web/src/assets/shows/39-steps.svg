<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#080a06"/>
      <stop offset="100%" stop-color="#050604"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <!-- Steps going up -->
  <rect x="80" y="350" width="440" height="12" fill="none" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.15"/>
  <rect x="110" y="320" width="380" height="12" fill="none" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.14"/>
  <rect x="140" y="290" width="320" height="12" fill="none" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.13"/>
  <rect x="170" y="260" width="260" height="12" fill="none" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.11"/>
  <rect x="200" y="230" width="200" height="12" fill="none" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.09"/>
  <rect x="230" y="200" width="140" height="12" fill="none" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.07"/>
  <!-- Company -->
  <text x="300" y="95" font-family="Georgia, serif" font-size="13" fill="#c9a84c" fill-opacity="0.55" text-anchor="middle" letter-spacing="5">TEATRO LIVE!</text>
  <!-- Title -->
  <text x="300" y="460" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle">THE 39</text>
  <text x="300" y="540" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="#c9a84c" text-anchor="middle">STEPS</text>
  <line x1="120" y1="565" x2="480" y2="565" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="300" y="605" font-family="Georgia, serif" font-size="14" fill="#ffffff" fill-opacity="0.35" text-anchor="middle" font-style="italic">A comedy of thrills and spills</text>
  <text x="300" y="658" font-family="Georgia, serif" font-size="13" fill="#c9a84c" fill-opacity="0.5" text-anchor="middle" letter-spacing="3">OCT 13 – OCT 31, 2026</text>
  <text x="300" y="768" font-family="Georgia, serif" font-size="11" fill="#c9a84c" fill-opacity="0.25" text-anchor="middle" letter-spacing="4">VARSCONA THEATRE</text>
</svg>
