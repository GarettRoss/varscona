<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <rect width="600" height="800" fill="none" stroke="#ffffff" stroke-width="0.4" stroke-dasharray="1,60" stroke-opacity="0.05"/>

  <!-- Staircase: 6 steps going up left-to-right, centered at (300, 288) -->
  <g transform="translate(300, 288)" fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main staircase profile -->
    <path d="M -105 105 H -70 V 70 H -35 V 35 H 0 V 0 H 35 V -35 H 70 V -70 H 105 V -105"
          stroke-width="3" stroke-opacity="0.65"/>
    <!-- Shadow/depth lines on each tread -->
    <line x1="-70" y1="105" x2="-70" y2="108" stroke-width="1.5" stroke-opacity="0.2"/>
    <line x1="-35" y1="70" x2="-35" y2="73" stroke-width="1.5" stroke-opacity="0.2"/>
    <line x1="0" y1="35" x2="0" y2="38" stroke-width="1.5" stroke-opacity="0.2"/>
    <line x1="35" y1="0" x2="35" y2="3" stroke-width="1.5" stroke-opacity="0.2"/>
    <line x1="70" y1="-35" x2="70" y2="-32" stroke-width="1.5" stroke-opacity="0.2"/>
    <!-- Handrail -->
    <line x1="-112" y1="90" x2="112" y2="-120" stroke-width="1.5" stroke-opacity="0.35"/>
    <!-- Handrail posts -->
    <line x1="-87" y1="97" x2="-87" y2="72" stroke-width="1" stroke-opacity="0.25"/>
    <line x1="-17" y1="27" x2="-17" y2="2" stroke-width="1" stroke-opacity="0.25"/>
    <line x1="52" y1="-42" x2="52" y2="-67" stroke-width="1" stroke-opacity="0.25"/>
  </g>

  <text x="300" y="96" font-family="Georgia, serif" font-size="13" fill="#ffffff" fill-opacity="0.65" text-anchor="middle" letter-spacing="5">TEATRO LIVE!</text>
  <line x1="120" y1="112" x2="480" y2="112" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.2"/>

  <text x="300" y="490" font-family="Georgia, serif" font-size="28" fill="#ffffff" fill-opacity="0.45" text-anchor="middle" letter-spacing="10">THE</text>
  <text x="300" y="575" font-family="Georgia, serif" font-size="110" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="-3">39</text>
  <text x="300" y="648" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="#ffffff" fill-opacity="0.8" text-anchor="middle" letter-spacing="-1">STEPS</text>

  <line x1="160" y1="672" x2="440" y2="672" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.25"/>
  <text x="300" y="708" font-family="Georgia, serif" font-size="16" fill="#ffffff" fill-opacity="0.6" text-anchor="middle" letter-spacing="3">OCT 13 – 31</text>
  <text x="300" y="762" font-family="Georgia, serif" font-size="11" fill="#ffffff" fill-opacity="0.25" text-anchor="middle" letter-spacing="4">VARSCONA THEATRE · EDMONTON</text>
</svg>
