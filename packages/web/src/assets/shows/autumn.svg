<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <rect width="600" height="800" fill="none" stroke="#ffffff" stroke-width="0.4" stroke-dasharray="1,60" stroke-opacity="0.07"/>

  <!-- Icon: falling leaf -->
  <g transform="translate(300, 310)" fill="none" stroke="#ffffff" stroke-opacity="0.6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Leaf outline -->
    <path d="M0,-120 C60,-80 90,-20 70,40 C50,90 10,110 0,120 C-10,110 -50,90 -70,40 C-90,-20 -60,-80 0,-120 Z"/>
    <!-- Centre vein -->
    <line x1="0" y1="-120" x2="0" y2="120"/>
    <!-- Side veins -->
    <line x1="0" y1="-60" x2="50" y2="-20"/>
    <line x1="0" y1="-20" x2="62" y2="20"/>
    <line x1="0" y1="20" x2="55" y2="55"/>
    <line x1="0" y1="-60" x2="-50" y2="-20"/>
    <line x1="0" y1="-20" x2="-62" y2="20"/>
    <line x1="0" y1="20" x2="-55" y2="55"/>
    <!-- Stem -->
    <path d="M0,120 C10,145 5,165 0,180" stroke-opacity="0.4"/>
  </g>

  <!-- Company -->
  <text x="300" y="96" font-family="Georgia, serif" font-size="13" fill="#ffffff" fill-opacity="0.65" text-anchor="middle" letter-spacing="5">SHADOW THEATRE</text>
  <line x1="120" y1="112" x2="480" y2="112" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Title -->
  <text x="300" y="560" font-family="Georgia, serif" font-size="110" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="-2">AUTUMN</text>

  <!-- Date -->
  <line x1="160" y1="590" x2="440" y2="590" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.25"/>
  <text x="300" y="628" font-family="Georgia, serif" font-size="16" fill="#ffffff" fill-opacity="0.6" text-anchor="middle" letter-spacing="3">SEPT 8 – OCT 4</text>

  <text x="300" y="762" font-family="Georgia, serif" font-size="11" fill="#ffffff" fill-opacity="0.25" text-anchor="middle" letter-spacing="4">VARSCONA THEATRE · EDMONTON</text>
</svg>
