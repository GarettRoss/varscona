<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f0a05"/>
      <stop offset="100%" stop-color="#1a0e04"/>
    </linearGradient>
    <radialGradient id="warm" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#8b3a0f" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8b3a0f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#warm)"/>

  <!-- Falling leaves (abstract) -->
  <ellipse cx="130" cy="120" rx="12" ry="7" fill="#8b3a0f" fill-opacity="0.5" transform="rotate(-30 130 120)"/>
  <ellipse cx="460" cy="180" rx="10" ry="6" fill="#c9a84c" fill-opacity="0.4" transform="rotate(20 460 180)"/>
  <ellipse cx="80" cy="300" rx="8" ry="5" fill="#8b3a0f" fill-opacity="0.3" transform="rotate(-15 80 300)"/>
  <ellipse cx="520" cy="90" rx="11" ry="6" fill="#c9a84c" fill-opacity="0.35" transform="rotate(40 520 90)"/>
  <ellipse cx="200" cy="200" rx="9" ry="5" fill="#a04515" fill-opacity="0.3" transform="rotate(-45 200 200)"/>
  <ellipse cx="400" cy="280" rx="8" ry="5" fill="#c9a84c" fill-opacity="0.25" transform="rotate(10 400 280)"/>
  <ellipse cx="550" cy="350" rx="10" ry="6" fill="#8b3a0f" fill-opacity="0.35" transform="rotate(-25 550 350)"/>
  <ellipse cx="50" cy="420" rx="9" ry="5" fill="#c9a84c" fill-opacity="0.2" transform="rotate(35 50 420)"/>

  <!-- Bare tree silhouette (right side) -->
  <line x1="490" y1="800" x2="490" y2="400" stroke="#2a1505" stroke-width="18" stroke-linecap="round"/>
  <line x1="490" y1="500" x2="430" y2="380" stroke="#2a1505" stroke-width="10" stroke-linecap="round"/>
  <line x1="490" y1="460" x2="560" y2="340" stroke="#2a1505" stroke-width="8" stroke-linecap="round"/>
  <line x1="430" y1="380" x2="380" y2="310" stroke="#2a1505" stroke-width="6" stroke-linecap="round"/>
  <line x1="490" y1="420" x2="540" y2="380" stroke="#2a1505" stroke-width="5" stroke-linecap="round"/>

  <!-- Company -->
  <text x="260" y="100" font-family="Georgia, serif" font-size="13" fill="#c9a84c" fill-opacity="0.55" text-anchor="middle" letter-spacing="5">SHADOW THEATRE</text>

  <!-- Title -->
  <text x="260" y="460" font-family="Georgia, serif" font-size="110" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="-2">AUT-</text>
  <text x="260" y="570" font-family="Georgia, serif" font-size="110" font-weight="bold" fill="#c9a84c" text-anchor="middle" letter-spacing="-2">UMN</text>

  <!-- Divider -->
  <line x1="140" y1="600" x2="380" y2="600" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.35"/>

  <!-- Tagline -->
  <text x="260" y="638" font-family="Georgia, serif" font-size="14" fill="#ffffff" fill-opacity="0.35" text-anchor="middle" font-style="italic">When everything changes</text>

  <!-- Date -->
  <text x="260" y="690" font-family="Georgia, serif" font-size="13" fill="#c9a84c" fill-opacity="0.5" text-anchor="middle" letter-spacing="3">FALL 2025</text>

  <text x="260" y="768" font-family="Georgia, serif" font-size="11" fill="#c9a84c" fill-opacity="0.25" text-anchor="middle" letter-spacing="4">VARSCONA THEATRE</text>
</svg>
