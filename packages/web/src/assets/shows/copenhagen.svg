<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#050a10"/>
      <stop offset="100%" stop-color="#030608"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <!-- Atom orbits -->
  <ellipse cx="300" cy="230" rx="120" ry="50" fill="none" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.18" transform="rotate(0 300 230)"/>
  <ellipse cx="300" cy="230" rx="120" ry="50" fill="none" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.14" transform="rotate(60 300 230)"/>
  <ellipse cx="300" cy="230" rx="120" ry="50" fill="none" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.12" transform="rotate(120 300 230)"/>
  <circle cx="300" cy="230" r="6" fill="#c9a84c" fill-opacity="0.2"/>
  <!-- Company -->
  <text x="300" y="95" font-family="Georgia, serif" font-size="13" fill="#c9a84c" fill-opacity="0.55" text-anchor="middle" letter-spacing="5">SHADOW THEATRE</text>
  <line x1="100" y1="112" x2="500" y2="112" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.2"/>
  <!-- Title -->
  <text x="300" y="470" font-family="Georgia, serif" font-size="78" font-weight="bold" fill="#ffffff" text-anchor="middle">COPEN</text>
  <text x="300" y="552" font-family="Georgia, serif" font-size="78" font-weight="bold" fill="#c9a84c" text-anchor="middle">HAGEN</text>
  <line x1="120" y1="577" x2="480" y2="577" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="300" y="617" font-family="Georgia, serif" font-size="13" fill="#ffffff" fill-opacity="0.35" text-anchor="middle" font-style="italic">By Michael Frayn</text>
  <text x="300" y="668" font-family="Georgia, serif" font-size="13" fill="#c9a84c" fill-opacity="0.5" text-anchor="middle" letter-spacing="3">NOV 10 – NOV 28, 2026</text>
  <text x="300" y="768" font-family="Georgia, serif" font-size="11" fill="#c9a84c" fill-opacity="0.25" text-anchor="middle" letter-spacing="4">VARSCONA THEATRE</text>
</svg>
