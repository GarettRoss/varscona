<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <rect width="600" height="800" fill="none" stroke="#ffffff" stroke-width="0.4" stroke-dasharray="1,60" stroke-opacity="0.05"/>

  <!-- Map frame -->
  <rect x="148" y="162" width="304" height="242" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.5" rx="2"/>

  <!-- Grid lines (lat/long) -->
  <g stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.18">
    <line x1="148" y1="242" x2="452" y2="242"/>
    <line x1="148" y1="322" x2="452" y2="322"/>
    <line x1="224" y1="162" x2="224" y2="404"/>
    <line x1="300" y1="162" x2="300" y2="404"/>
    <line x1="376" y1="162" x2="376" y2="404"/>
  </g>

  <!-- Simplified Jutland peninsula -->
  <path d="M 232 390 L 228 355 L 222 310 L 224 272 L 230 238 L 238 210 L 248 188 L 258 178
           L 266 182 L 264 200 L 256 228 L 252 262 L 255 295 L 258 330 L 254 365 L 248 390 Z"
        fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.55" stroke-linejoin="round"/>

  <!-- Zealand island (where Copenhagen sits) -->
  <path d="M 318 240 L 330 230 L 348 234 L 358 248 L 356 268 L 344 282 L 328 280 L 316 268 L 314 252 Z"
        fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.5" stroke-linejoin="round"/>

  <!-- Funen island -->
  <path d="M 272 300 L 282 292 L 296 294 L 302 306 L 296 318 L 280 318 L 270 308 Z"
        fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.4" stroke-linejoin="round"/>

  <!-- Copenhagen location marker -->
  <circle cx="342" cy="254" r="5" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.8"/>
  <circle cx="342" cy="254" r="2" fill="#ffffff" fill-opacity="0.8"/>
  <line x1="342" y1="259" x2="342" y2="278" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Compass rose — bottom right of map -->
  <g transform="translate(432, 388)" stroke="#ffffff" stroke-linecap="round">
    <line x1="0" y1="-14" x2="0" y2="14" stroke-width="1.2" stroke-opacity="0.5"/>
    <line x1="-14" y1="0" x2="14" y2="0" stroke-width="1.2" stroke-opacity="0.5"/>
    <line x1="-9" y1="-9" x2="9" y2="9" stroke-width="0.7" stroke-opacity="0.25"/>
    <line x1="9" y1="-9" x2="-9" y2="9" stroke-width="0.7" stroke-opacity="0.25"/>
  </g>
  <text x="432" y="368" font-family="Georgia, serif" font-size="10" fill="#ffffff" fill-opacity="0.5" text-anchor="middle" letter-spacing="1">N</text>

  <text x="300" y="96" font-family="Georgia, serif" font-size="13" fill="#ffffff" fill-opacity="0.65" text-anchor="middle" letter-spacing="5">SHADOW THEATRE</text>
  <line x1="120" y1="112" x2="480" y2="112" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.2"/>

  <text x="300" y="525" font-family="Georgia, serif" font-size="78" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="-1">COPEN</text>
  <text x="300" y="610" font-family="Georgia, serif" font-size="78" font-weight="bold" fill="#ffffff" fill-opacity="0.8" text-anchor="middle" letter-spacing="-1">HAGEN</text>

  <line x1="160" y1="638" x2="440" y2="638" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.25"/>
  <text x="300" y="676" font-family="Georgia, serif" font-size="16" fill="#ffffff" fill-opacity="0.6" text-anchor="middle" letter-spacing="3">NOV 10 – 28</text>
  <text x="300" y="762" font-family="Georgia, serif" font-size="11" fill="#ffffff" fill-opacity="0.25" text-anchor="middle" letter-spacing="4">VARSCONA THEATRE · EDMONTON</text>
</svg>
