<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <rect width="600" height="800" fill="none" stroke="#ffffff" stroke-width="0.4" stroke-dasharray="1,60" stroke-opacity="0.07"/>

  <!-- Glow lines radiating outward -->
  <g transform="translate(300, 310)" stroke="#ffffff" stroke-linecap="round">
    <!-- Long rays -->
    <line x1="0" y1="-95" x2="0" y2="-145" stroke-opacity="0.18" stroke-width="1.5"/>
    <line x1="67" y1="-67" x2="102" y2="-102" stroke-opacity="0.15" stroke-width="1.5"/>
    <line x1="95" y1="0" x2="145" y2="0" stroke-opacity="0.18" stroke-width="1.5"/>
    <line x1="67" y1="67" x2="102" y2="102" stroke-opacity="0.12" stroke-width="1.5"/>
    <line x1="0" y1="95" x2="0" y2="145" stroke-opacity="0.15" stroke-width="1.5"/>
    <line x1="-67" y1="67" x2="-102" y2="102" stroke-opacity="0.12" stroke-width="1.5"/>
    <line x1="-95" y1="0" x2="-145" y2="0" stroke-opacity="0.18" stroke-width="1.5"/>
    <line x1="-67" y1="-67" x2="-102" y2="-102" stroke-opacity="0.15" stroke-width="1.5"/>
    <!-- Short rays between -->
    <line x1="35" y1="-88" x2="50" y2="-126" stroke-opacity="0.1" stroke-width="1"/>
    <line x1="88" y1="-35" x2="126" y2="-50" stroke-opacity="0.1" stroke-width="1"/>
    <line x1="88" y1="35" x2="126" y2="50" stroke-opacity="0.1" stroke-width="1"/>
    <line x1="35" y1="88" x2="50" y2="126" stroke-opacity="0.1" stroke-width="1"/>
    <line x1="-35" y1="88" x2="-50" y2="126" stroke-opacity="0.1" stroke-width="1"/>
    <line x1="-88" y1="35" x2="-126" y2="50" stroke-opacity="0.1" stroke-width="1"/>
    <line x1="-88" y1="-35" x2="-126" y2="-50" stroke-opacity="0.1" stroke-width="1"/>
    <line x1="-35" y1="-88" x2="-50" y2="-126" stroke-opacity="0.1" stroke-width="1"/>
  </g>

  <!-- Outer glow ring -->
  <circle cx="300" cy="310" r="108" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="18"/>
  <circle cx="300" cy="310" r="90" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>

  <!-- Heart -->
  <g transform="translate(300, 310)">
    <path d="M0,52 C0,52 -72,-18 -72,-54 C-72,-90 -36,-105 0,-72 C36,-105 72,-90 72,-54 C72,-18 0,52 0,52 Z"
          fill="none" stroke="#ffffff" stroke-opacity="0.75" stroke-width="3" stroke-linejoin="round"/>
    <!-- Inner heart -->
    <path d="M0,28 C0,28 -40,-10 -40,-30 C-40,-50 -20,-58 0,-40 C20,-58 40,-50 40,-30 C40,-10 0,28 0,28 Z"
          fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.5" stroke-linejoin="round"/>
  </g>

  <!-- Company -->
  <text x="300" y="96" font-family="Georgia, serif" font-size="13" fill="#ffffff" fill-opacity="0.65" text-anchor="middle" letter-spacing="5">TEATRO LIVE!</text>
  <line x1="120" y1="112" x2="480" y2="112" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Title -->
  <text x="300" y="520" font-family="Georgia, serif" font-size="46" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">THE GLITTERING</text>
  <text x="300" y="598" font-family="Georgia, serif" font-size="78" font-weight="bold" fill="#ffffff" fill-opacity="0.85" text-anchor="middle" letter-spacing="-1">HEART</text>

  <!-- Date -->
  <line x1="160" y1="624" x2="440" y2="624" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.25"/>
  <text x="300" y="662" font-family="Georgia, serif" font-size="16" fill="#ffffff" fill-opacity="0.6" text-anchor="middle" letter-spacing="3">MAY 28 – JUNE 13</text>

  <text x="300" y="762" font-family="Georgia, serif" font-size="11" fill="#ffffff" fill-opacity="0.25" text-anchor="middle" letter-spacing="4">VARSCONA THEATRE · EDMONTON</text>
</svg>
