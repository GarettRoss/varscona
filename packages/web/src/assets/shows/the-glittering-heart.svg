<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <rect width="600" height="800" fill="none" stroke="#ffffff" stroke-width="0.4" stroke-dasharray="1,60" stroke-opacity="0.07"/>

  <!-- Venice canal water -->
  <g transform="translate(300, 390)" stroke="#ffffff" fill="none">
    <path d="M-160,80 Q-80,68 0,80 Q80,92 160,80" stroke-opacity="0.15" stroke-width="1.5"/>
    <path d="M-160,95 Q-80,83 0,95 Q80,107 160,95" stroke-opacity="0.1" stroke-width="1"/>
    <path d="M-160,110 Q-80,98 0,110 Q80,122 160,110" stroke-opacity="0.07" stroke-width="1"/>

    <!-- Gondola hull -->
    <path d="M-90,60 Q-100,72 -85,78 L85,78 Q100,72 90,60 Q60,30 0,28 Q-60,30 -90,60 Z"
          stroke-opacity="0.55" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Gondola prow (ferro) -->
    <path d="M90,60 L108,30 L112,10 L106,-5 L112,10 L108,30"
          stroke-opacity="0.5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Gondola interior seat -->
    <path d="M-30,50 Q0,42 30,50" stroke-opacity="0.25" stroke-width="1.5"/>

    <!-- Gondolier pole -->
    <line x1="-60" y1="28" x2="-72" y2="-110" stroke-opacity="0.4" stroke-width="2" stroke-linecap="round"/>
    <!-- Gondolier silhouette -->
    <ellipse cx="-65" cy="-118" rx="10" ry="12" stroke-opacity="0.35" stroke-width="1.8"/>
    <line x1="-65" y1="-106" x2="-65" y2="-70" stroke-opacity="0.35" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M-80,-88 L-65,-80 L-50,-88" stroke-opacity="0.3" stroke-width="2" stroke-linecap="round"/>

    <!-- Water reflection of gondola -->
    <path d="M-90,78 Q-60,90 0,88 Q60,90 90,78" stroke-opacity="0.1" stroke-width="1"/>
  </g>

  <!-- Glittering heart floating above gondola -->
  <g transform="translate(300, 240)">
    <path d="M0,22 C0,22 -34,-12 -34,-32 C-34,-52 -17,-60 0,-44 C17,-60 34,-52 34,-32 C34,-12 0,22 0,22 Z"
          fill="none" stroke="#ffffff" stroke-opacity="0.6" stroke-width="2.5"/>
    <!-- Sparkles around heart -->
    <line x1="-48" y1="-38" x2="-56" y2="-46" stroke-opacity="0.3" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-52" y1="-28" x2="-62" y2="-28" stroke-opacity="0.2" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="48" y1="-38" x2="56" y2="-46" stroke-opacity="0.3" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="52" y1="-28" x2="62" y2="-28" stroke-opacity="0.2" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="-65" x2="0" y2="-75" stroke-opacity="0.3" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-8" y1="-62" x2="-12" y2="-70" stroke-opacity="0.2" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="8" y1="-62" x2="12" y2="-70" stroke-opacity="0.2" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Inner heart glow -->
    <path d="M0,10 C0,10 -18,-6 -18,-18 C-18,-28 -9,-32 0,-24 C9,-32 18,-28 18,-18 C18,-6 0,10 0,10 Z"
          fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.2"/>
  </g>

  <!-- Company -->
  <text x="300" y="96" font-family="Georgia, serif" font-size="13" fill="#ffffff" fill-opacity="0.65" text-anchor="middle" letter-spacing="5">TEATRO LIVE!</text>
  <line x1="120" y1="112" x2="480" y2="112" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Title -->
  <text x="300" y="520" font-family="Georgia, serif" font-size="46" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">THE GLITTERING</text>
  <text x="300" y="598" font-family="Georgia, serif" font-size="78" font-weight="bold" fill="#ffffff" fill-opacity="0.85" text-anchor="middle" letter-spacing="-1">HEART</text>

  <!-- Date -->
  <line x1="160" y1="624" x2="440" y2="624" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.25"/>
  <text x="300" y="662" font-family="Georgia, serif" font-size="16" fill="#ffffff" fill-opacity="0.6" text-anchor="middle" letter-spacing="3">MAY 28 – JUNE 13</text>

  <text x="300" y="762" font-family="Georgia, serif" font-size="11" fill="#ffffff" fill-opacity="0.25" text-anchor="middle" letter-spacing="4">VARSCONA THEATRE · EDMONTON</text>
</svg>
