<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06080a"/>
      <stop offset="100%" stop-color="#0c1014"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <!-- Horizontal still lines -->
  <line x1="0" y1="280" x2="600" y2="280" stroke="#c9a84c" stroke-width="0.4" stroke-opacity="0.08"/>
  <line x1="0" y1="300" x2="600" y2="300" stroke="#c9a84c" stroke-width="0.4" stroke-opacity="0.06"/>
  <line x1="0" y1="320" x2="600" y2="320" stroke="#c9a84c" stroke-width="0.4" stroke-opacity="0.04"/>
  <!-- Clock face (abstract) -->
  <circle cx="300" cy="220" r="80" fill="none" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.15"/>
  <line x1="300" y1="220" x2="300" y2="155" stroke="#c9a84c" stroke-width="1.5" stroke-opacity="0.2"/>
  <line x1="300" y1="220" x2="355" y2="245" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.15"/>
  <!-- Company -->
  <text x="300" y="95" font-family="Georgia, serif" font-size="13" fill="#c9a84c" fill-opacity="0.55" text-anchor="middle" letter-spacing="5">HOUSE OF HUSH</text>
  <!-- Title -->
  <text x="300" y="440" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="#ffffff" text-anchor="middle">THE STILL</text>
  <text x="300" y="508" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="#c9a84c" text-anchor="middle">HOURS</text>
  <line x1="150" y1="533" x2="450" y2="533" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="300" y="573" font-family="Georgia, serif" font-size="14" fill="#ffffff" fill-opacity="0.35" text-anchor="middle" font-style="italic">In silence, everything is heard</text>
  <text x="300" y="626" font-family="Georgia, serif" font-size="13" fill="#c9a84c" fill-opacity="0.5" text-anchor="middle" letter-spacing="3">JAN 12 – JAN 30, 2027</text>
  <text x="300" y="768" font-family="Georgia, serif" font-size="11" fill="#c9a84c" fill-opacity="0.25" text-anchor="middle" letter-spacing="4">VARSCONA THEATRE</text>
</svg>
