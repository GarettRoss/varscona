<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <rect width="600" height="800" fill="none" stroke="#ffffff" stroke-width="0.4" stroke-dasharray="1,60" stroke-opacity="0.07"/>

  <!-- Popcorn bucket -->
  <g transform="translate(300, 300)">
    <!-- Bucket body -->
    <path d="M-70,-20 L-85,90 L85,90 L70,-20 Z" fill="none" stroke="#ffffff" stroke-opacity="0.6" stroke-width="3" stroke-linejoin="round"/>
    <!-- Bucket stripes -->
    <path d="M-35,-20 L-42,90" stroke="#ffffff" stroke-opacity="0.25" stroke-width="2"/>
    <path d="M0,-20 L0,90" stroke="#ffffff" stroke-opacity="0.25" stroke-width="2"/>
    <path d="M35,-20 L42,90" stroke="#ffffff" stroke-opacity="0.25" stroke-width="2"/>
    <!-- Bucket rim -->
    <path d="M-72,-20 L72,-20" stroke="#ffffff" stroke-opacity="0.5" stroke-width="3" stroke-linecap="round"/>

    <!-- Waterfall flowing out of bucket top -->
    <!-- Main cascade -->
    <path d="M-18,-20 C-18,-55 -10,-70 -10,-100 C-10,-130 -4,-145 0,-165 C4,-145 10,-130 10,-100 C10,-70 18,-55 18,-20"
          fill="none" stroke="#ffffff" stroke-opacity="0.5" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Side streams -->
    <path d="M-28,-30 C-32,-60 -26,-80 -22,-110 C-20,-130 -16,-142 -14,-158"
          fill="none" stroke="#ffffff" stroke-opacity="0.28" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M28,-30 C32,-60 26,-80 22,-110 C20,-130 16,-142 14,-158"
          fill="none" stroke="#ffffff" stroke-opacity="0.28" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Popcorn pieces floating up -->
    <ellipse cx="-45" cy="-55" rx="10" ry="8" fill="none" stroke="#ffffff" stroke-opacity="0.45" stroke-width="2"/>
    <ellipse cx="48" cy="-70" rx="8" ry="10" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="2"/>
    <ellipse cx="-30" cy="-95" rx="7" ry="6" fill="none" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1.5"/>
    <ellipse cx="35" cy="-115" rx="6" ry="8" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1.5"/>
    <ellipse cx="-50" cy="-130" rx="5" ry="5" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.5"/>

    <!-- Splash at base of waterfall inside bucket -->
    <path d="M-22,-18 Q-10,-8 0,-18 Q10,-8 22,-18" fill="none" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Company -->
  <text x="300" y="96" font-family="Georgia, serif" font-size="13" fill="#ffffff" fill-opacity="0.65" text-anchor="middle" letter-spacing="5">TEATRO LIVE!</text>
  <line x1="120" y1="112" x2="480" y2="112" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Title -->
  <text x="300" y="520" font-family="Georgia, serif" font-size="80" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="-1">POPCORN</text>
  <text x="300" y="608" font-family="Georgia, serif" font-size="80" font-weight="bold" fill="#ffffff" fill-opacity="0.8" text-anchor="middle" letter-spacing="-1">FALLS</text>

  <!-- Date -->
  <line x1="160" y1="634" x2="440" y2="634" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.25"/>
  <text x="300" y="672" font-family="Georgia, serif" font-size="16" fill="#ffffff" fill-opacity="0.6" text-anchor="middle" letter-spacing="3">COMING SOON</text>

  <text x="300" y="762" font-family="Georgia, serif" font-size="11" fill="#ffffff" fill-opacity="0.25" text-anchor="middle" letter-spacing="4">VARSCONA THEATRE · EDMONTON</text>
</svg>
