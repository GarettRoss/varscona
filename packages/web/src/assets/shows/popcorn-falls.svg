  <ellipse cx="300" cy="155" rx="13" ry="11" fill="none" stroke="#ffffff" stroke-opacity="0.75" stroke-width="2.2"/>
  <ellipse cx="298" cy="196" rx="11" ry="13" fill="none" stroke="#ffffff" stroke-opacity="0.68" stroke-width="2"/>
  <ellipse cx="302" cy="240" rx="12" ry="10" fill="none" stroke="#ffffff" stroke-opacity="0.62" stroke-width="2"/>
  <ellipse cx="299" cy="282" rx="10" ry="12" fill="none" stroke="#ffffff" stroke-opacity="0.52" stroke-width="1.8"/>
  <ellipse cx="301" cy="324" rx="13" ry="10" fill="none" stroke="#ffffff" stroke-opacity="0.42" stroke-width="1.5"/>

