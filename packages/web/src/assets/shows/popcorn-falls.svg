<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <rect width="600" height="800" fill="none" stroke="#ffffff" stroke-width="0.4" stroke-dasharray="1,60" stroke-opacity="0.07"/>

  <!-- Popcorn kernel — large single piece -->
  <g transform="translate(300, 300)">
    <!-- Main body — rounded irregular blob -->
    <path d="
      M0,-120
      C40,-130 80,-110 95,-75
      C115,-35 105,10 85,40
      C70,65 80,95 60,115
      C40,135 10,130 -10,115
      C-35,98 -40,110 -65,100
      C-95,88 -105,55 -95,25
      C-85,-5 -100,-40 -85,-70
      C-70,-100 -40,-110 0,-120
      Z"
      fill="none" stroke="#ffffff" stroke-opacity="0.65" stroke-width="3" stroke-linejoin="round"/>

    <!-- Puffed top lobe -->
    <path d="
      M-30,-95
      C-50,-140 -20,-165 10,-155
      C40,-145 55,-115 40,-90"
      fill="none" stroke="#ffffff" stroke-opacity="0.5" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Right lobe -->
    <path d="
      M70,-55
      C110,-70 130,-40 120,-10
      C110,15 85,20 75,5"
      fill="none" stroke="#ffffff" stroke-opacity="0.45" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Bottom right lobe -->
    <path d="
      M75,55
      C100,50 120,75 110,100
      C100,120 75,125 60,110"
      fill="none" stroke="#ffffff" stroke-opacity="0.4" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Left lobe -->
    <path d="
      M-80,-30
      C-120,-45 -140,-15 -130,15
      C-120,40 -100,45 -88,30"
      fill="none" stroke="#ffffff" stroke-opacity="0.45" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Inner texture lines -->
    <path d="M-10,-80 C10,-60 20,-20 10,20" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M30,-60 C40,-30 35,10 20,40" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M-40,-50 C-30,-20 -25,20 -35,50" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Company -->
  <text x="300" y="96" font-family="Georgia, serif" font-size="13" fill="#ffffff" fill-opacity="0.65" text-anchor="middle" letter-spacing="5">TEATRO LIVE!</text>
  <line x1="120" y1="112" x2="480" y2="112" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Title -->
  <text x="300" y="520" font-family="Georgia, serif" font-size="80" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="-1">POPCORN</text>
  <text x="300" y="608" font-family="Georgia, serif" font-size="80" font-weight="bold" fill="#ffffff" fill-opacity="0.8" text-anchor="middle" letter-spacing="-1">FALLS</text>

  <!-- Date -->
  <line x1="160" y1="634" x2="440" y2="634" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.25"/>
  <text x="300" y="672" font-family="Georgia, serif" font-size="16" fill="#ffffff" fill-opacity="0.6" text-anchor="middle" letter-spacing="3">FEB 19 – MAR 7</text>

  <text x="300" y="762" font-family="Georgia, serif" font-size="11" fill="#ffffff" fill-opacity="0.25" text-anchor="middle" letter-spacing="4">VARSCONA THEATRE · EDMONTON</text>
</svg>
