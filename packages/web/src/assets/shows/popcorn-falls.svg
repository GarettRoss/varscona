  <ellipse cx="330" cy="160" rx="10" ry="12" fill="none" stroke="#ffffff" stroke-opacity="0.7" stroke-width="2"/>
  <ellipse cx="335" cy="203" rx="12" ry="10" fill="none" stroke="#ffffff" stroke-opacity="0.65" stroke-width="2"/>
  <ellipse cx="328" cy="246" rx="11" ry="13" fill="none" stroke="#ffffff" stroke-opacity="0.58" stroke-width="2"/>
  <ellipse cx="332" cy="288" rx="13" ry="10" fill="none" stroke="#ffffff" stroke-opacity="0.48" stroke-width="1.8"/>
  <ellipse cx="329" cy="330" rx="10" ry="11" fill="none" stroke="#ffffff" stroke-opacity="0.38" stroke-width="1.5"/>

