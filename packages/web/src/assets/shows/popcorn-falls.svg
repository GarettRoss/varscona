  <ellipse cx="233" cy="338" rx="12" ry="10" fill="none" stroke="#ffffff" stroke-opacity="0.45" stroke-width="1.8"/>

  <!-- Column 2 -->
  <ellipse cx="270" cy="160" rx="11" ry="13" fill="none" stroke="#ffffff" stroke-opacity="0.7" stroke-width="2"/>
  <ellipse cx="265" cy="203" rx="13" ry="10" fill="none" stroke="#ffffff" stroke-opacity="0.65" stroke-width="2"/>
  <ellipse cx="272" cy="246" rx="10" ry="12" fill="none" stroke="#ffffff" stroke-opacity="0.6" stroke-width="2"/>
  <ellipse cx="268" cy="288" rx="12" ry="11" fill="none" stroke="#ffffff" stroke-opacity="0.5" stroke-width="1.8"/>
  <ellipse cx="274" cy="330" rx="11" ry="10" fill="none" stroke="#ffffff" stroke-opacity="0.4" stroke-width="1.5"/>

