  <ellipse cx="354" cy="372" rx="13" ry="10" fill="none" stroke="#ffffff" stroke-opacity="0.5" stroke-width="1.8"/>
  <!-- Pool line -->
  <path d="M180,385 Q300,378 420,385" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Company -->
  <text x="300" y="96" font-family="Georgia, serif" font-size="13" fill="#ffffff" fill-opacity="0.65" text-anchor="middle" letter-spacing="5">TEATRO LIVE!</text>
  <line x1="120" y1="112" x2="480" y2="112" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.2"/>

