  <ellipse cx="368" cy="175" rx="11" ry="10" fill="none" stroke="#ffffff" stroke-opacity="0.68" stroke-width="2"/>
  <ellipse cx="372" cy="216" rx="13" ry="11" fill="none" stroke="#ffffff" stroke-opacity="0.62" stroke-width="2"/>
  <ellipse cx="365" cy="258" rx="10" ry="13" fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="2"/>
