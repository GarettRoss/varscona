  <ellipse cx="275" cy="378" rx="12" ry="9" fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.8"/>
  <ellipse cx="300" cy="374" rx="15" ry="10" fill="none" stroke="#ffffff" stroke-opacity="0.6" stroke-width="2"/>
