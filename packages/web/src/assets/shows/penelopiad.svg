<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0f0c06"/>
      <stop offset="100%" stop-color="#080604"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <!-- Weaving threads -->
  <path d="M 60 180 Q 200 120 340 180 Q 480 240 600 180" fill="none" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.18"/>
  <path d="M 60 210 Q 200 150 340 210 Q 480 270 600 210" fill="none" stroke="#c9a84c" stroke-width="0.6" stroke-opacity="0.14"/>
  <path d="M 60 240 Q 200 180 340 240 Q 480 300 600 240" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.1"/>
  <path d="M 0 270 Q 140 210 280 270 Q 420 330 560 270" fill="none" stroke="#c9a84c" stroke-width="0.4" stroke-opacity="0.08"/>
  <!-- Company -->
  <text x="300" y="95" font-family="Georgia, serif" font-size="13" fill="#c9a84c" fill-opacity="0.55" text-anchor="middle" letter-spacing="5">SHADOW THEATRE</text>
  <line x1="100" y1="112" x2="500" y2="112" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.2"/>
  <!-- Title -->
  <text x="300" y="445" font-family="Georgia, serif" font-size="56" font-weight="bold" fill="#ffffff" text-anchor="middle">THE</text>
  <text x="300" y="518" font-family="Georgia, serif" font-size="50" font-weight="bold" fill="#c9a84c" text-anchor="middle">PENELOPIAD</text>
  <line x1="100" y1="543" x2="500" y2="543" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="300" y="583" font-family="Georgia, serif" font-size="13" fill="#ffffff" fill-opacity="0.35" text-anchor="middle" font-style="italic">After Margaret Atwood</text>
  <text x="300" y="636" font-family="Georgia, serif" font-size="13" fill="#c9a84c" fill-opacity="0.5" text-anchor="middle" letter-spacing="3">FEB 9 – FEB 27, 2027</text>
  <text x="300" y="768" font-family="Georgia, serif" font-size="11" fill="#c9a84c" fill-opacity="0.25" text-anchor="middle" letter-spacing="4">VARSCONA THEATRE</text>
</svg>
