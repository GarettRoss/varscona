<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0d0510"/>
      <stop offset="100%" stop-color="#060208"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <!-- Spider web (top corner) -->
  <line x1="0" y1="0" x2="200" y2="200" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.15"/>
  <line x1="0" y1="0" x2="0" y2="200" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.15"/>
  <line x1="0" y1="0" x2="200" y2="0" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.15"/>
  <circle cx="0" cy="0" r="80" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.12"/>
  <circle cx="0" cy="0" r="140" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.1"/>
  <!-- Moon -->
  <circle cx="430" cy="150" r="55" fill="none" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.18"/>
  <circle cx="455" cy="135" r="55" fill="#0d0510" />
  <!-- Company -->
  <text x="300" y="95" font-family="Georgia, serif" font-size="13" fill="#c9a84c" fill-opacity="0.55" text-anchor="middle" letter-spacing="5">DIE-NASTY</text>
  <!-- Title -->
  <text x="300" y="380" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="#ffffff" text-anchor="middle">DIE-NASTY</text>
  <text x="300" y="435" font-family="Georgia, serif" font-size="22" fill="#c9a84c" text-anchor="middle" letter-spacing="4">HALLOWEEN</text>
  <text x="300" y="500" font-family="Georgia, serif" font-size="46" font-weight="bold" fill="#c9a84c" text-anchor="middle">SPECTACULAR</text>
  <line x1="100" y1="525" x2="500" y2="525" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="300" y="565" font-family="Georgia, serif" font-size="14" fill="#ffffff" fill-opacity="0.35" text-anchor="middle" font-style="italic">The scariest improv night of the year</text>
  <text x="300" y="618" font-family="Georgia, serif" font-size="13" fill="#c9a84c" fill-opacity="0.5" text-anchor="middle" letter-spacing="3">OCT 26, 2026</text>
  <text x="300" y="768" font-family="Georgia, serif" font-size="11" fill="#c9a84c" fill-opacity="0.25" text-anchor="middle" letter-spacing="4">VARSCONA THEATRE</text>
</svg>
