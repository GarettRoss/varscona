<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 54" fill="none">

  <!-- Layer 1: outermost stroke — widest, defines the letter boundary -->
  <text
    x="2" y="38"
    font-family="Inter, ui-sans-serif, sans-serif"
    font-weight="800"
    font-size="42"
    letter-spacing="1.5"
    fill="transparent"
    stroke="white"
    stroke-width="9"
    paint-order="stroke fill"
  >VARSCONA</text>

  <!-- Layer 2: mid stroke — second concentric line inset from outer -->
  <text
    x="2" y="38"
    font-family="Inter, ui-sans-serif, sans-serif"
    font-weight="800"
    font-size="42"
    letter-spacing="1.5"
    fill="transparent"
    stroke="white"
    stroke-width="4"
    paint-order="stroke fill"
  >VARSCONA</text>

  <!-- Layer 3: inner relief line — thinnest, closest to letter centre -->
  <text
    x="2" y="38"
    font-family="Inter, ui-sans-serif, sans-serif"
    font-weight="800"
    font-size="42"
    letter-spacing="1.5"
    fill="none"
    stroke="white"
    stroke-width="1"
  >VARSCONA</text>

  <!-- THEATRE: gold, right-aligned, wide tracking -->
  <text
    x="338" y="51"
    font-family="Inter, ui-sans-serif, sans-serif"
    font-weight="300"
    font-size="10"
    letter-spacing="5"
    fill="#c9a84c"
    text-anchor="end"
  >THEATRE</text>

</svg>
