<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 800" width="1440" height="800">
  <defs>
    <!-- Sky gradient -->
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#050202"/>
      <stop offset="55%" stop-color="#0e0404"/>
      <stop offset="100%" stop-color="#1a0606"/>
    </linearGradient>
    <!-- Ground gradient -->
    <linearGradient id="ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a0606"/>
      <stop offset="100%" stop-color="#0a0202"/>
    </linearGradient>
    <!-- Building face gradient -->
    <linearGradient id="bldg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a0808"/>
      <stop offset="100%" stop-color="#1c0505"/>
    </linearGradient>
    <!-- Entrance canopy gradient -->
    <linearGradient id="canopy" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a0c0c"/>
      <stop offset="100%" stop-color="#220707"/>
    </linearGradient>
    <!-- Spotlight left -->
    <linearGradient id="spotL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </linearGradient>
    <!-- Spotlight right -->
    <linearGradient id="spotR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </linearGradient>
    <!-- Centre spotlight -->
    <radialGradient id="spotC" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <!-- Curtain left -->
    <linearGradient id="curtL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3d0808"/>
      <stop offset="100%" stop-color="#1a0404" stop-opacity="0"/>
    </linearGradient>
    <!-- Curtain right -->
    <linearGradient id="curtR" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#3d0808"/>
      <stop offset="100%" stop-color="#1a0404" stop-opacity="0"/>
    </linearGradient>
    <!-- Window glow -->
    <radialGradient id="winGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <!-- Ground reflection -->
    <linearGradient id="reflect" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="1440" height="800" fill="url(#sky)"/>

  <!-- Stars -->
  <g fill="#c9a84c" fill-opacity="0.25">
    <circle cx="120" cy="60" r="1.2"/><circle cx="245" cy="35" r="0.8"/>
    <circle cx="380" cy="80" r="1"/><circle cx="510" cy="45" r="1.4"/>
    <circle cx="660" cy="25" r="0.9"/><circle cx="780" cy="55" r="1.1"/>
    <circle cx="900" cy="38" r="0.8"/><circle cx="1020" cy="70" r="1.3"/>
    <circle cx="1150" cy="30" r="1"/><circle cx="1280" cy="50" r="0.9"/>
    <circle cx="1380" cy="75" r="1.2"/><circle cx="60" cy="110" r="0.7"/>
    <circle cx="200" cy="120" r="1"/><circle cx="440" cy="140" r="0.8"/>
    <circle cx="700" cy="100" r="1.1"/><circle cx="950" cy="130" r="0.9"/>
    <circle cx="1200" cy="110" r="1.2"/><circle cx="1400" cy="95" r="0.8"/>
  </g>
  <!-- Faint star shimmer -->
  <g fill="#ffffff" fill-opacity="0.08">
    <circle cx="175" cy="90" r="0.6"/><circle cx="820" cy="42" r="0.5"/>
    <circle cx="1100" cy="68" r="0.7"/><circle cx="340" cy="115" r="0.5"/>
  </g>

  <!-- Spotlight beams from above -->
  <polygon points="200,0 330,0 560,680 480,680" fill="url(#spotL)" opacity="0.7"/>
  <polygon points="620,0 820,0 820,680 620,680" fill="url(#spotC)" opacity="0.6"/>
  <polygon points="1110,0 1240,0 960,680 880,680" fill="url(#spotR)" opacity="0.7"/>

  <!-- Left stage curtain -->
  <path d="M0,0 C80,100 120,300 90,800 L0,800 Z" fill="url(#curtL)" opacity="0.9"/>
  <path d="M0,0 C50,150 70,350 45,800 L0,800 Z" fill="#2d0707" opacity="0.6"/>
  <!-- Curtain fold lines left -->
  <path d="M30,0 C60,200 50,400 35,800" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.12"/>
  <path d="M65,0 C90,180 80,380 60,800" fill="none" stroke="#c9a84c" stroke-width="0.4" stroke-opacity="0.08"/>

  <!-- Right stage curtain -->
  <path d="M1440,0 C1360,100 1320,300 1350,800 L1440,800 Z" fill="url(#curtR)" opacity="0.9"/>
  <path d="M1440,0 C1390,150 1370,350 1395,800 L1440,800 Z" fill="#2d0707" opacity="0.6"/>
  <!-- Curtain fold lines right -->
  <path d="M1410,0 C1380,200 1390,400 1405,800" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.12"/>
  <path d="M1375,0 C1350,180 1360,380 1380,800" fill="none" stroke="#c9a84c" stroke-width="0.4" stroke-opacity="0.08"/>

  <!-- Ground / street -->
  <rect x="0" y="660" width="1440" height="140" fill="url(#ground)"/>
  <!-- Ground line -->
  <line x1="0" y1="660" x2="1440" y2="660" stroke="#c9a84c" stroke-width="0.6" stroke-opacity="0.15"/>
  <!-- Street reflection glow -->
  <ellipse cx="720" cy="700" rx="500" ry="30" fill="url(#reflect)" opacity="0.8"/>

  <!-- ── VARSCONA THEATRE BUILDING ── -->

  <!-- Back tower / upper section -->
  <rect x="560" y="200" width="180" height="460" fill="url(#bldg)"/>
  <rect x="560" y="200" width="180" height="460" fill="none" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.2"/>
  <!-- Tower windows upper -->
  <rect x="590" y="230" width="40" height="55" rx="2" fill="#c9a84c" fill-opacity="0.06" stroke="#c9a84c" stroke-width="0.7" stroke-opacity="0.35"/>
  <rect x="670" y="230" width="40" height="55" rx="2" fill="#c9a84c" fill-opacity="0.06" stroke="#c9a84c" stroke-width="0.7" stroke-opacity="0.35"/>
  <rect x="590" y="305" width="40" height="55" rx="2" fill="#c9a84c" fill-opacity="0.04" stroke="#c9a84c" stroke-width="0.7" stroke-opacity="0.28"/>
  <rect x="670" y="305" width="40" height="55" rx="2" fill="#c9a84c" fill-opacity="0.04" stroke="#c9a84c" stroke-width="0.7" stroke-opacity="0.28"/>
  <!-- Tower top parapet -->
  <rect x="548" y="188" width="204" height="18" fill="#380e0e" stroke="#c9a84c" stroke-width="0.7" stroke-opacity="0.3"/>
  <rect x="548" y="180" width="204" height="10" fill="#c9a84c" fill-opacity="0.15"/>

  <!-- Main building body (wider, lower) -->
  <rect x="420" y="340" width="600" height="320" fill="url(#bldg)"/>
  <rect x="420" y="340" width="600" height="320" fill="none" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.18"/>

  <!-- Main building roofline -->
  <rect x="410" y="328" width="620" height="20" fill="#2e0909" stroke="#c9a84c" stroke-width="0.7" stroke-opacity="0.25"/>
  <line x1="410" y1="328" x2="1030" y2="328" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.35"/>

  <!-- Upper floor windows row -->
  <rect x="445" y="360" width="55" height="70" rx="1" fill="#c9a84c" fill-opacity="0.06" stroke="#c9a84c" stroke-width="0.7" stroke-opacity="0.3"/>
  <rect x="520" y="360" width="55" height="70" rx="1" fill="#c9a84c" fill-opacity="0.08" stroke="#c9a84c" stroke-width="0.7" stroke-opacity="0.3"/>
  <!-- window glow on lit ones -->
  <rect x="520" y="360" width="55" height="70" rx="1" fill="url(#winGlow)"/>
  <rect x="770" y="360" width="55" height="70" rx="1" fill="#c9a84c" fill-opacity="0.06" stroke="#c9a84c" stroke-width="0.7" stroke-opacity="0.3"/>
  <rect x="845" y="360" width="55" height="70" rx="1" fill="#c9a84c" fill-opacity="0.09" stroke="#c9a84c" stroke-width="0.7" stroke-opacity="0.3"/>
  <rect x="845" y="360" width="55" height="70" rx="1" fill="url(#winGlow)"/>
  <rect x="920" y="360" width="55" height="70" rx="1" fill="#c9a84c" fill-opacity="0.05" stroke="#c9a84c" stroke-width="0.7" stroke-opacity="0.25"/>
  <rect x="995" y="360" width="25" height="70" rx="1" fill="#c9a84c" fill-opacity="0.05" stroke="#c9a84c" stroke-width="0.7" stroke-opacity="0.22"/>

  <!-- Horizontal band between floors -->
  <line x1="420" y1="450" x2="1020" y2="450" stroke="#c9a84c" stroke-width="0.6" stroke-opacity="0.18"/>

  <!-- Entrance / canopy area (curved front) -->
  <path d="M570,450 L570,660 L870,660 L870,450 Z" fill="url(#canopy)"/>
  <path d="M570,450 L570,660 L870,660 L870,450 Z" fill="none" stroke="#c9a84c" stroke-width="0.7" stroke-opacity="0.2"/>
  <!-- Canopy curve top -->
  <path d="M555,450 Q720,410 885,450" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-opacity="0.45"/>
  <path d="M555,450 Q720,415 885,450" fill="#2a0808" fill-opacity="0.5"/>

  <!-- VARSCONA sign panel -->
  <rect x="585" y="490" width="270" height="55" rx="2" fill="#0a0202" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="720" y="525" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="#c9a84c" fill-opacity="0.75" text-anchor="middle" letter-spacing="8">VARSCONA</text>

  <!-- Entrance doors -->
  <rect x="645" y="575" width="50" height="85" rx="1" fill="#0d0303" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.3"/>
  <rect x="745" y="575" width="50" height="85" rx="1" fill="#0d0303" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.3"/>
  <!-- Door handles -->
  <line x1="665" y1="617" x2="680" y2="617" stroke="#c9a84c" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="760" y1="617" x2="775" y2="617" stroke="#c9a84c" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Steps -->
  <rect x="590" y="660" width="260" height="10" rx="1" fill="#280707" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.2"/>
  <rect x="600" y="670" width="240" height="8" rx="1" fill="#220606"/>

  <!-- Vertical marquee sign (right side) -->
  <rect x="1035" y="300" width="30" height="260" rx="2" fill="#200606" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.35"/>
  <!-- Marquee lights -->
  <circle cx="1050" cy="320" r="4" fill="#c9a84c" fill-opacity="0.5"/>
  <circle cx="1050" cy="345" r="4" fill="#c9a84c" fill-opacity="0.35"/>
  <circle cx="1050" cy="370" r="4" fill="#c9a84c" fill-opacity="0.5"/>
  <circle cx="1050" cy="395" r="4" fill="#c9a84c" fill-opacity="0.3"/>
  <circle cx="1050" cy="420" r="4" fill="#c9a84c" fill-opacity="0.45"/>
  <circle cx="1050" cy="445" r="4" fill="#c9a84c" fill-opacity="0.35"/>
  <circle cx="1050" cy="470" r="4" fill="#c9a84c" fill-opacity="0.5"/>
  <circle cx="1050" cy="495" r="4" fill="#c9a84c" fill-opacity="0.3"/>
  <!-- Marquee bracket -->
  <line x1="1035" y1="290" x2="1000" y2="290" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="1000" y1="280" x2="1000" y2="310" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.25"/>

  <!-- Left secondary entrance / side wall -->
  <rect x="420" y="460" width="150" height="200" fill="#230707"/>
  <rect x="420" y="460" width="150" height="200" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.12"/>
  <!-- Side windows -->
  <rect x="440" y="480" width="35" height="50" rx="1" fill="#c9a84c" fill-opacity="0.04" stroke="#c9a84c" stroke-width="0.6" stroke-opacity="0.2"/>
  <rect x="495" y="480" width="35" height="50" rx="1" fill="#c9a84c" fill-opacity="0.04" stroke="#c9a84c" stroke-width="0.6" stroke-opacity="0.2"/>

  <!-- Architectural detail lines on building -->
  <line x1="420" y1="390" x2="560" y2="390" stroke="#c9a84c" stroke-width="0.4" stroke-opacity="0.12"/>
  <line x1="740" y1="390" x2="1020" y2="390" stroke="#c9a84c" stroke-width="0.4" stroke-opacity="0.12"/>
  <line x1="420" y1="520" x2="560" y2="520" stroke="#c9a84c" stroke-width="0.4" stroke-opacity="0.1"/>
  <line x1="870" y1="520" x2="1020" y2="520" stroke="#c9a84c" stroke-width="0.4" stroke-opacity="0.1"/>

  <!-- Ground reflection of building -->
  <rect x="420" y="660" width="600" height="60" fill="#1a0505" fill-opacity="0.5"/>
  <line x1="420" y1="660" x2="1020" y2="660" stroke="#c9a84c" stroke-width="0.4" stroke-opacity="0.1"/>

  <!-- Gold ground strip (matches varsconatheatre.com) -->
  <rect x="0" y="788" width="1440" height="12" fill="#c9a84c" fill-opacity="0.22"/>
  <line x1="0" y1="788" x2="1440" y2="788" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Fade to black overlay at top (so navbar text stays readable) -->
  <linearGradient id="topFade" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#050101" stop-opacity="0.7"/>
    <stop offset="20%" stop-color="#050101" stop-opacity="0"/>
  </linearGradient>
  <rect width="1440" height="200" fill="url(#topFade)"/>

  <!-- Fade to black overlay at bottom (so content below merges cleanly) -->
  <linearGradient id="btmFade" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#0a0202" stop-opacity="0"/>
    <stop offset="100%" stop-color="#0a0a0a" stop-opacity="1"/>
  </linearGradient>
  <rect y="500" width="1440" height="300" fill="url(#btmFade)"/>
</svg>
